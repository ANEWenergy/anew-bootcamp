          <img class="vthumb" src="https://i.ytimg.com/vi/${l.video}/hqdefault.jpg" alt="" referrerpolicy="no-referrer" onerror="this.style.display='none'">
          <div class="pl"></div><div class="vt">${t('watch')}</div></div>
        <div class="videocap"><a href="https://www.youtube.com/watch?v=${l.video}" target="_blank" rel="noopener noreferrer">${t('openyt')} \u2197</a></div>`
     : `<div class="video" onclick="toast('\u25B6')"><div class="pl"></div><div class="vt">${t('watch')}</div></div>`}
   <div class="body">${body}</div>
   ${l.tip?`<div class="tip"><b>TECH TIP \u00B7</b> ${tr(l.tip)}</div>`:''}
   ${sup}
   <button class="readaloud" id="readaloud" onclick="toggleRead()"></button>
   <div class="pad"><button class="btn green" onclick="startQuiz()">${t('startquiz')} (${l.quiz.length}) \u2192</button></div>
   <div style="height:14px"></div>`;
  const rb=document.getElementById('readaloud'); if(rb) updateReadBtn(rb);
}

function renderQuiz(){
  const m=COURSE.modules.find(x=>x.id===state.activeModule);
  const l=m.lessons.find(x=>x.id===state.activeLesson);
  const bank=l.quiz;
  if(state.qi>=bank.length){return renderResults(m,l,bank);}
  const q=bank[state.qi];
  const prog=Math.round((state.qi/bank.length)*100);
  let opts=q.opts.map((o,i)=>{
    let cls='opt';
    if(state.answered){if(i===q.a)cls+=' correct';else if(i===state.picked)cls+=' wrong';}
    return `<div class="${cls}" onclick="${state.answered?'':`pick(${i})`}"><div class="k">${String.fromCharCode(65+i)}</div><div>${tr(o)}</div></div>`;
  }).join('');
  let fb='';
  if(state.answered){
    const ok=state.picked===q.a;
    fb=`<div class="fb ${ok?'ok':'no'}"><b>${ok?'\u2713 '+t('correct'):'\u2715 '+t('incorrect')}</b><br>${tr(q.fb)}</div>
      <button class="btn" onclick="nextQ()">${state.qi+1>=bank.length?t('see'):t('next')} \u2192</button>`;
  }
  app.innerHTML=`${topbar()}
   <div class="quizwrap fade"><button class="back" style="margin-bottom:8px" onclick="sfx('tap');state.inQuiz=false;render();app.scrollTop=0">\u2039 ${t('backlesson')}</button>
     <div class="qbrand"><img src="${ANEW_LOGO}"><b>ANEW \u00B7 ${t('check')}</b></div>
     <div class="qcount">${tr(l.title)} \u2014 ${t('question')} ${state.qi+1} ${t('of')} ${bank.length}</div>
     <div class="qprog"><i style="width:${prog}%"></i></div>
     <span class="qtag ${q.tag==='recall'?'recall':''}">${q.tag==='recall'?'\u21BA '+t('recall'):t('check')}</span>
     <div class="qstem">${tr(q.stem)}</div>${opts}${fb}
   </div><div style="height:20px"></div>`;
}

function renderResults(m,l,bank){
  const score=Math.round((state.qscore/bank.length)*100);
  const passed=score>=70;
  recordQuiz(m.id,l.id,score);
  if(passed){state.lessonDone[lessonKey(m.id,l.id)]=true;}
  saveProfile();
  const modDone = moduleProgress(m).pct===100;
  if(passed && burstOnce!==l.id){burst();burstOnce=l.id;}
  // find next lesson
  const idx=m.lessons.findIndex(x=>x.id===l.id);
  const hasNext=idx<m.lessons.length-1;
  app.innerHTML=`${topbar()}
   <div class="result fade"><span class="pill ${passed?'lvl':'ghost'}">${passed?t('passed'):t('retry')}</span>
     <div class="big" style="color:${passed?'#7fe089':'var(--orange)'}">${score}%</div>
     <p class="muted" style="margin:0">${state.qscore} / ${bank.length} ${t('correct').toLowerCase()}</p>
     ${(passed&&modDone)?certCard(tr(m.title)):''}
     <div style="height:10px"></div>
     ${passed?(hasNext?`<button class="btn green" onclick="gotoNextLesson('${m.lessons[idx+1].id}')">${t('nextlesson')} \u2192</button>
        <div style="height:8px"></div><button class="btn ghost" onclick="closeLesson()">${t('backlessons')}</button>`
        :`<button class="btn green" onclick="closeLesson()">${t('finishmod')} \u2713</button>`)
       :`<button class="btn" onclick="startQuiz()">${t('retry')}</button>
         <div style="height:8px"></div><button class="btn ghost" onclick="closeLesson()">${t('backlessons')}</button>`}
   </div>`;
}
let burstOnce=null;

function renderProgress(){
  const o=coursePct();
  let rows='';
  COURSE.modules.forEach(m=>{const p=moduleProgress(m);
    rows+=`<div class="suprow"><span>${tr(m.title)}</span><b style="color:${p.pct===100?'#7fe089':'var(--muted)'}">${p.done}/${p.total} \u00B7 ${p.pct}%</b></div>`;});
  app.innerHTML=`${topbar()}
   <div class="pad fade"><div class="card center">
     <div class="pring" style="--p:${o};margin:0 auto"><div class="inner"><b>${o}%</b><span>${t('overall').toUpperCase()}</span></div></div>
     <h3 style="margin:14px 0 2px">${tr(COURSE.title)}</h3>
     <p class="muted" style="margin:0;font-size:13px">${lessonsCompleted()} / ${lessonsTotal()} ${t('lessons').toLowerCase()}</p></div>
     <div class="card"><b style="font-family:'Sora';font-size:14px">${t('modules')}</b><div style="margin-top:8px">${rows}</div></div>
     <div class="card"><b style="font-family:'Sora';font-size:14px">This week</b>
       <div style="display:flex;gap:6px;margin-top:12px;align-items:flex-end;height:80px">
         ${[30,55,40,80,65,90,100].map((h,i)=>`<div style="flex:1;text-align:center"><div style="height:${h*.7}px;background:linear-gradient(180deg,var(--orange),var(--green));border-radius:6px"></div><span style="font-size:9px;color:var(--muted)">${['M','T','W','T','F','S','S'][i]}</span></div>`).join('')}
       </div></div></div>`;
}

function renderCerts(){
  // a cert per fully-completed module
  const earned=COURSE.modules.filter(m=>moduleProgress(m).pct===100);
  app.innerHTML=`${topbar()}<div class="pad fade"><div class="sect" style="margin-left:0">${t('certs')} \u00B7 ${earned.length}</div>
     ${earned.length?earned.map(m=>certCard(tr(m.title))).join(''):`<div class="card center muted">${tr2('Finish all lessons in a module to earn its certificate.','Termina todas las lecciones de un m\u00F3dulo para obtener su certificado.')}</div>`}</div>`;
}
function certCard(title){return `<div class="cert"><div class="seal">ANEW<br>CERTIFIED</div><img src="${ANEW_LOGO}"><div class="ct">${title}</div><div class="cs">ANEW Energy Manufacturing Boot Camp \u00B7 ${tr2('Verified completion','Finalizaci\u00F3n verificada')}</div></div>`;}

function renderProfile(){
  const l=LANGS.find(x=>x.code===state.lang)||LANGS[0];
  const p=state.profile; const nm=firstName()||tr2('Learner','Aprendiz');
  const contact = (p.phone||p.email)
    ? `${p.phone?`<div class="suprow"><span>${t('fPhone')}</span><b>${((p.dial||'')+' '+p.phone).replace(/</g,'')}</b></div>`:''}
       ${p.email?`<div class="suprow"><span>${t('fEmail')}</span><b>${p.email.replace(/</g,'')}</b></div>`:''}`
    : `<div class="suprow"><span>${t('fPhone')} / ${t('fEmail')}</span><b class="muted">\u2014</b></div>`;
  app.innerHTML=`${topbar()}<div class="pad fade">
     <div class="card center"><div class="bigring" style="width:80px;height:80px;margin:0 auto 10px"><img src="${ANEW_LOGO}" style="width:54px;height:54px"></div>
       <h3 style="margin:0">${nm}</h3><p class="muted" style="margin:4px 0 0;font-size:13px">Boot Camp \u00B7 ${l.native}</p></div>
     <div class="card"><div class="suprow"><span>${tr2('Language','Idioma')}</span><b>${l.fl} ${l.native}</b></div>
       <div class="suprow"><span>${tr2('Trade','Oficio')}</span><b>${tr(COURSE.title)}</b></div>
       <div class="suprow"><span>${t('lessons')}</span><b>${lessonsCompleted()}/${lessonsTotal()}</b></div>
       <div class="suprow"><span>${t('streak')}</span><b>${state.streak} \uD83D\uDD25</b></div></div>
     <div class="card"><b style="font-family:'Sora';font-size:14px">${tr2('Your details','Tus datos')}</b>
       <div style="margin-top:8px">${contact}</div></div>
     ${(p.matches&&p.matches.length)?`<div class="card"><b style="font-family:'Sora';font-size:14px">${t('svResultT')}</b>
       <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
       ${p.matches.map((id,i)=>{const tr0=TRADES.find(x=>x.id===id);return tr0?`<div class="suprow" style="cursor:pointer" onclick="openTrade('${id}')"><span><b style="font-weight:600">${i+1}. ${tr0.title}</b><br><span class="muted" style="font-size:12px">${t('svFit')} ${whyMatch(id)}</span></span><span class="muted">\u203A</span></div>`:'';}).join('')}
       </div></div>`:''}
     <button class="btn ghost" onclick="retakeSurvey()">${(p.matches&&p.matches.length)?t('svRetake'):t('svFind')}</button>
     <div style="height:8px"></div>
     <button class="btn ghost" onclick="state.screen='signup';render()">${tr2('Edit my details','Editar mis datos')}</button>
     <div style="height:8px"></div>
     <button class="btn ghost" onclick="state.screen='hub';render()">${t('changetrade')}</button>
     <div style="height:8px"></div>
     <button class="btn ghost" onclick="state.screen='lang';render()">${tr2('Change language','Cambiar idioma')}</button>
     <div style="height:8px"></div>
     <button class="btn ghost" onclick="audioInit();musicStart();state.intro=0;state.screen='intro';render()">${t('replay')}</button></div>`;
}

function renderTabs(){
  const tabs=[{k:'home',l:t('home'),i:'M4 12 12 4l8 8M6 10v9h12v-9'},
    {k:'progress',l:t('progress'),i:'M4 19V5m6 14V9m6 10V13m4 6V7'},
    {k:'certs',l:t('certs'),i:'M12 3l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 8.7l5.4-.8z'},
    {k:'profile',l:t('profile'),i:'M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm-7 8a7 7 0 0 1 14 0'}];
  tabbarEl.className='tabbar';
  tabbarEl.innerHTML=tabs.map(tb=>`<button class="tab ${state.tab===tb.k&&!state.activeModule&&!state.activeLesson&&!state.inQuiz?'on':''}" onclick="goTab('${tb.k}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${tb.i}"/></svg>${tb.l}</button>`).join('');
}

/* ---------- actions ---------- */
function goTab(k){stopReading();state.tab=k;state.activeModule=null;state.activeLesson=null;state.inQuiz=false;try{ if(!AUDIO.muted){ if(AUDIO.started){ musicResume(); } else { musicStart(); } } }catch(e){}render();}
function openModule(id){state.activeModule=id;state.activeLesson=null;state.inQuiz=false;render();app.scrollTop=0;}
function closeModule(){stopReading();state.activeModule=null;state.activeLesson=null;state.inQuiz=false;state.tab='home';try{ if(!AUDIO.muted){ if(AUDIO.started){ musicResume(); } else { musicStart(); } } }catch(e){}render();app.scrollTop=0;}
function openLesson(id){state.activeLesson=id;state.inQuiz=false;try{ if(songEl){ songEl.pause(); } synthMusicStop(); }catch(e){}render();app.scrollTop=0;}
function closeLesson(){stopReading();state.activeLesson=null;state.inQuiz=false;try{ if(!AUDIO.muted){ if(AUDIO.started){ musicResume(); } else { musicStart(); } } }catch(e){}render();app.scrollTop=0;}
function playVideo(id){
  const box=document.getElementById('vidbox');
  if(!box) return;
  box.removeAttribute('onclick');
  box.classList.add('playing');
  // Inject the player on the user click so autoplay is treated as a user gesture.
  box.innerHTML='<iframe id="ytframe" src="https://www.youtube.com/embed/'+id+'?autoplay=1&playsinline=1&rel=0&modestbranding=1&enablejsapi=1" '
    +'title="ANEW lesson video" frameborder="0" '
    +'allow="autoplay; encrypted-media; picture-in-picture; fullscreen; accelerometer; gyroscope; clipboard-write" '
    +'allowfullscreen></iframe>'
    +'<button class="vidfallback" onclick="event.stopPropagation();window.open(\'https://www.youtube.com/watch?v='+id+'\',\'_blank\',\'noopener\')">'
    + (window.__t?window.__t('cantplay'):'Video won\u2019t play here? Open on YouTube \u2197') +'</button>';
}
function gotoNextLesson(id){stopReading();state.activeLesson=id;state.inQuiz=false;render();app.scrollTop=0;}
function startQuiz(){stopReading();state.inQuiz=true;state.qi=0;state.qscore=0;state.answered=false;state.picked=null;render();app.scrollTop=0;}
function pick(i){state.picked=i;state.answered=true;
  const m=COURSE.modules.find(x=>x.id===state.activeModule);
  const l=m.lessons.find(x=>x.id===state.activeLesson);
  if(i===l.quiz[state.qi].a){state.qscore++;sfx('success');}else{sfx('wrong');}render();}
function nextQ(){state.qi++;state.answered=false;state.picked=null;render();app.scrollTop=0;}
function toast(msg){const d=document.createElement('div');d.textContent=msg;
  d.style.cssText='position:absolute;bottom:96px;left:50%;transform:translateX(-50%);background:rgba(20,32,26,.97);border:1px solid var(--line);color:var(--text);padding:11px 16px;border-radius:12px;font-size:13px;z-index:99;max-width:80%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.5)';
  document.querySelector('.phone').appendChild(d);setTimeout(()=>d.remove(),1900);}
function burst(){const cols=['#F39019','#F5C518','#4BA84B','#E8721F'];
  for(let i=0;i<40;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'%';c.style.background=cols[i%4];
    c.style.animationDuration=(1.6+Math.random()*1.4)+'s';c.style.animationDelay=Math.random()*.4+'s';
    document.querySelector('.phone').appendChild(c);setTimeout(()=>c.remove(),3400);}}


/* Start music on the user's FIRST interaction anywhere (browsers block audio before a gesture).
   This makes the song begin the moment the user first touches the app, not one screen later. */
function startMusicOnFirstInteraction(){
  /* Start (or resume) the background music on the learner's first interaction,
     no matter which path they take into the app — including skipping the intro
     and going straight to the hub/lessons. Respects the mute preference and
     never double-starts if the intro already began the song. */
  if(window.__musicArmed) return;
  window.__musicArmed=true;
  var go=function(){
    if(AUDIO && AUDIO.muted) return;        /* honour the saved mute preference */
    if(AUDIO && AUDIO.started){             /* intro/Start already kicked it off */
      try{ musicResume(); }catch(e){}
    } else {
      try{ audioInit(); audioResume(); musicStart(); }catch(e){}
    }
    /* Once the song is actually playing, stop listening. If it was blocked
       (e.g. autoplay policy), keep the listeners so the next gesture retries. */
    if(AUDIO && AUDIO.started){
      document.removeEventListener('pointerdown', go, true);
      document.removeEventListener('touchstart', go, true);
      document.removeEventListener('keydown', go, true);
      document.removeEventListener('click', go, true);
      window.__musicArmed=false;
    }
  };
  document.addEventListener('pointerdown', go, true);
  document.addEventListener('touchstart', go, true);
  document.addEventListener('keydown', go, true);
  document.addEventListener('click', go, true);
}

/* Deep link: a standalone trade page (e.g. "PCB Design.html") redirects here
   as index.html#trade=<id>. If we recognize a live trade, launch straight into
   it so double-clicking a trade file opens the real simulator focused on it. */
function openDeepLinkTrade(){
  var m = (location.hash||'').match(/trade=([^&]+)/);
  if(!m) return false;
  var id = decodeURIComponent(m[1]);
  var tr = TRADES.find(function(x){return x.id===id;});
  if(!tr || !tr.live) return false;
  if(!state.lang) state.lang='en';   // sensible default; learner can switch in-app
  openTrade(id);                      // handles loading + render
  return true;
}
if(!openDeepLinkTrade()){ render(); }
window.addEventListener('hashchange', function(){ openDeepLinkTrade(); });
startMusicOnFirstInteraction();
</script>
