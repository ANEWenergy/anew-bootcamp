<style>
:root{
  --orange:#F39019; --orange2:#E8721F; --yellow:#F5C518; --green:#4BA84B; --green2:#2F8F3F;
  --ink:#13201A; --ink2:#21342B; --paper:#0E1813; --card:#16241D; --card2:#1d3127;
  --line:rgba(255,255,255,.08); --muted:#9fc4ad; --text:#eaf6ee; --gold:#F5C518;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#05090a;font-family:'Archivo',sans-serif;color:var(--text)}
.phone{max-width:430px;margin:0 auto;min-height:100vh;background:
  radial-gradient(120% 80% at 50% -10%, rgba(243,144,25,.10), transparent 50%),
  radial-gradient(100% 60% at 50% 110%, rgba(75,168,75,.10), transparent 55%),
  var(--paper);position:relative;overflow:hidden;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px}
h1,h2,h3,.disp{font-family:'Sora',sans-serif}
.statusbar{height:env(safe-area-inset-top,0)}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 18px 10px;position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg, rgba(14,24,19,.96), rgba(14,24,19,.78) 70%, transparent);backdrop-filter:blur(10px)}
.logo{width:38px;height:38px;flex:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.brand{font-family:'Sora';font-weight:800;font-size:17px;letter-spacing:.3px;line-height:1}
.brand small{display:block;font-weight:500;font-size:10.5px;color:var(--muted);letter-spacing:1.5px;margin-top:3px}
.flagbtn{margin-left:auto;background:var(--card2);border:1px solid var(--line);border-radius:30px;padding:7px 12px;
  font-family:'Archivo';color:var(--text);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;cursor:pointer}
.pad{padding:6px 18px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 10px 30px -18px rgba(0,0,0,.8)}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:5px 11px;border-radius:30px}
.pill.lvl{background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500}
.pill.ghost{background:rgba(75,168,75,.16);color:#9be4a3;border:1px solid rgba(75,168,75,.3)}
.pill.soon{background:rgba(255,255,255,.07);color:var(--muted);border:1px solid var(--line)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;cursor:pointer;font-family:'Sora';font-weight:700;font-size:15px;border-radius:16px;padding:15px;color:#1a1003;background:linear-gradient(120deg,var(--orange),var(--yellow));box-shadow:0 8px 22px -8px rgba(243,144,25,.6);transition:.15s transform}
.btn:active{transform:scale(.98)}
.btn.green{background:linear-gradient(120deg,var(--green2),var(--green));color:#fff;box-shadow:0 8px 22px -8px rgba(75,168,75,.6)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);box-shadow:none}
.muted{color:var(--muted)} .center{text-align:center}
.langwrap{padding:40px 22px 30px;text-align:center;position:relative}
.bigring{width:104px;height:104px;margin:6px auto 14px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 25%, rgba(243,144,25,.25), transparent 60%);border:1px solid var(--line)}
.bigring img{width:78px;height:78px}
.langtitle{font-size:26px;font-weight:800;margin:6px 0 2px}
.langsub{color:var(--muted);font-size:14px;margin-bottom:22px}
.langgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.lang{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 12px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:11px;transition:.15s}
.lang:active{transform:scale(.97)}
.lang.sel{border-color:var(--orange);background:linear-gradient(160deg,rgba(243,144,25,.14),var(--card))}
.lang .fl{font-size:24px;line-height:1}
.lang b{font-family:'Sora';font-size:14px;display:block}
.lang span{font-size:11px;color:var(--muted)}
/* ---- intro slides ---- */
.introwrap{display:flex;flex-direction:column;min-height:100%;padding:0}
.introtop{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 6px}
.introname{font-family:'Sora';font-weight:700;font-size:14px;color:var(--text)}
.introskip{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;padding:6px 8px}
.introtopr{display:flex;align-items:center;gap:4px}
.mutebtn{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:50%;width:34px;height:34px;font-size:15px;cursor:pointer;display:grid;place-items:center;padding:0;line-height:1}
.mutebtn:hover{border-color:var(--orange)}
.langtopbar{position:absolute;top:14px;right:14px;z-index:5}
.introstage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:10px 26px 4px}
.introart{position:relative;width:148px;height:148px;display:grid;place-items:center;margin-bottom:18px}
.introglow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 40%,rgba(243,144,25,.32),transparent 62%);animation:pulse 3.4s ease-in-out infinite}
.introic{position:relative;width:104px;height:104px;border-radius:28px;display:grid;place-items:center;background:linear-gradient(140deg,var(--ink2),var(--card2));border:1px solid var(--line)}
.introic svg{width:50px;height:50px;color:var(--orange)}
.introart.fam{width:120px;height:120px;margin-bottom:14px}
.introart.fam .introic{width:88px;height:88px;border-radius:24px;border-color:rgba(243,144,25,.45);background:linear-gradient(140deg,rgba(243,144,25,.16),var(--card2))}
.introart.fam .introic svg{width:44px;height:44px}
.introtag{font-family:'Sora';font-weight:700;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--orange);background:rgba(243,144,25,.12);border:1px solid rgba(243,144,25,.3);padding:4px 11px;border-radius:20px;margin-bottom:10px}
.introtrades{margin-top:14px;max-width:330px;font-size:12.5px;line-height:1.7;color:var(--text);opacity:.82;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px}
.introprog{height:4px;margin:0 22px;border-radius:4px;background:rgba(255,255,255,.10);overflow:hidden}
.introprog span{display:block;height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .25s linear}
.famtrades{margin-top:16px;display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px}
.famtrade{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:13px;background:var(--card);border:1px solid var(--line);opacity:.4;transform:scale(.97);transition:.4s ease}
.famtrade.on{opacity:1;transform:scale(1);border-color:rgba(243,144,25,.55);background:linear-gradient(120deg,rgba(243,144,25,.14),var(--card));box-shadow:0 6px 18px rgba(0,0,0,.25)}
.famtradeic{width:34px;height:34px;flex:none;border-radius:10px;background:var(--ink2);display:grid;place-items:center;color:var(--orange)}
.famtrade.on .famtradeic{background:linear-gradient(140deg,rgba(243,144,25,.25),var(--ink2))}
.famtradeic svg{width:19px;height:19px}
.famtrade span{font-family:'Sora';font-weight:600;font-size:13.5px;text-align:left}
.introh{font-size:23px;font-weight:800;margin:2px 0 8px;letter-spacing:-.3px}
.introp{color:var(--muted);font-size:14.5px;line-height:1.55;max-width:340px;margin:0 auto}
.introbot{padding:14px 22px 26px}
.idots{display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.idot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.18);transition:.25s;cursor:pointer}
.idot.on{width:22px;border-radius:5px;background:linear-gradient(120deg,var(--orange),var(--yellow))}
.intronav{display:flex;gap:10px;align-items:center}
.intronav .btn{flex:1}
.intronav .introback{flex:0 0 auto;width:auto;padding:13px 18px}
@keyframes pulse{0%,100%{transform:scale(.92);opacity:.7}50%{transform:scale(1.06);opacity:1}}
@keyframes slidein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.introstage.fade{animation:slidein .42s ease}
/* ---- sign-up form ---- */
.suwrap{min-height:100%;padding:0 0 24px}
.subox{padding:6px 22px 0;text-align:center}
.suh{font-size:22px;font-weight:800;margin:4px 0 6px;letter-spacing:-.3px}
.susub{color:var(--muted);font-size:13.5px;line-height:1.5;margin:0 0 18px}
.sulab{display:block;text-align:left;font-family:'Sora';font-weight:600;font-size:12px;color:var(--muted);margin:12px 2px 5px}
.suin{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;color:var(--text);font-size:15px;font-family:'Inter',system-ui,sans-serif;outline:none;transition:.15s}
.phrow{display:flex;gap:8px}
.dialsel{width:118px;flex:none;padding:14px 8px;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 16px) 20px,calc(100% - 11px) 20px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
.dialsel option{background:var(--ink2);color:var(--text)}
.phin{flex:1;min-width:0}
.suin:focus{border-color:var(--orange);background:linear-gradient(160deg,rgba(243,144,25,.08),var(--card))}
.sucheck{display:flex;gap:10px;align-items:flex-start;text-align:left;margin:16px 2px 4px;font-size:12.5px;color:var(--muted);line-height:1.45;cursor:pointer}
.sucheck input{width:20px;height:20px;flex:none;margin-top:1px;accent-color:var(--orange)}
.suerr{display:none;color:#ffb4a0;background:rgba(232,114,31,.14);border:1px solid rgba(232,114,31,.3);border-radius:12px;padding:10px 12px;font-size:13px;margin:14px 0 4px;text-align:left}
.subox .btn{margin-top:16px}
.suopt{color:var(--muted);font-size:12px;margin-top:12px}
.suprivacy{color:var(--muted);opacity:.8;font-size:11px;line-height:1.5;text-align:left;margin:16px 2px 0;padding-top:14px;border-top:1px solid var(--line)}
/* ---- trade-finder survey ---- */
.svwrap{min-height:100%;display:flex;flex-direction:column;padding:0 0 24px}
.svhead{padding:6px 22px 0}
.svbar{height:6px;border-radius:6px;background:rgba(255,255,255,.12);overflow:hidden}
.svbar span{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .35s ease}
.svcount{font-family:'Sora';font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.3px}
.svq{font-family:'Sora';font-weight:800;font-size:21px;line-height:1.3;letter-spacing:-.3px;padding:18px 22px 4px}
.svopts{padding:8px 22px 0;display:flex;flex-direction:column;gap:10px}
.svopt{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;color:var(--text);font-size:15px;line-height:1.35;font-family:'Inter',system-ui,sans-serif;cursor:pointer;transition:.15s}
.svopt:hover{border-color:var(--orange);transform:translateY(-1px)}
.svopt.on{border-color:var(--orange);background:linear-gradient(160deg,rgba(243,144,25,.14),var(--card))}
.svfoot{padding:16px 22px 0}
.svfoot .btn{width:auto;padding:10px 18px}
.svfoot2{display:flex;gap:10px;align-items:center}
.svfoot2 .btn{flex:1}
.svintro{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;padding:10px 26px}
.svintroic{font-size:42px;margin-bottom:6px}
.svintrolist{list-style:none;padding:0;margin:14px 0 0;text-align:left;max-width:330px;margin-left:auto;margin-right:auto}
.svintrolist li{position:relative;padding:8px 0 8px 30px;font-size:14px;color:var(--text);border-bottom:1px solid var(--line)}
.svintrolist li:last-child{border-bottom:none}
.svintrolist li::before{content:'\2713';position:absolute;left:0;top:8px;width:20px;height:20px;border-radius:50%;background:rgba(75,168,75,.18);color:#7fe089;font-size:11px;font-weight:700;display:grid;place-items:center}
.svintronote{margin-top:14px;font-size:12px;color:var(--muted)}
/* ---- hub trade-finder banner ---- */
.finder{display:flex;gap:13px;align-items:flex-start;margin:0 18px 4px;padding:14px;border-radius:16px;background:linear-gradient(150deg,rgba(243,144,25,.14),var(--card));border:1px solid rgba(243,144,25,.35)}
.finder.done{background:linear-gradient(150deg,rgba(75,168,75,.12),var(--card));border-color:rgba(75,168,75,.3)}
.finderic{font-size:26px;flex:none;line-height:1.1}
.finderbody{flex:1;min-width:0}
.finderbody b{font-family:'Sora';font-size:15px;display:block}
.finderbody span{display:block;font-size:12.5px;color:var(--muted);line-height:1.45;margin:3px 0 9px}
.finderbtn{background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500;border:none;border-radius:20px;padding:8px 15px;font-family:'Sora';font-weight:700;font-size:12.5px;cursor:pointer}
.finder.done .finderbtn{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}
.matchwrap{min-height:100%;padding:0 0 24px}
.matchhero{text-align:center;padding:6px 22px 10px}
.matchspark{font-size:34px;margin-bottom:4px}
.matchcard{display:flex;align-items:center;gap:12px;margin:10px 18px;padding:14px;background:linear-gradient(150deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:16px;cursor:pointer;transition:.15s;position:relative}
.matchcard:hover{border-color:var(--orange);transform:translateY(-1px)}
.matchrank{position:absolute;top:-7px;left:-7px;width:24px;height:24px;border-radius:50%;background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500;font-family:'Sora';font-weight:800;font-size:13px;display:grid;place-items:center}
.matchic{width:42px;height:42px;flex:none;border-radius:12px;background:var(--ink2);display:grid;place-items:center;color:var(--orange)}
.matchic svg{width:22px;height:22px}
.matchbody{flex:1;min-width:0}
.matchtitle{font-family:'Sora';font-weight:700;font-size:15px}
.matchwhy{font-size:12.5px;color:var(--orange);margin-top:2px}
.matchcat{font-size:11.5px;color:var(--muted);margin-top:3px}
.matcharrow{width:18px;height:18px;color:var(--muted);flex:none}
.matchnote{margin:14px 22px 4px;padding:14px;background:rgba(75,168,75,.08);border:1px solid rgba(75,168,75,.25);border-radius:14px;font-size:12.5px;line-height:1.5;color:var(--muted);text-align:center}
.hubhead{padding:18px 18px 4px;text-align:center}
.hubhead h2{font-size:23px;margin:6px 0 2px}
.hubhead p{color:var(--muted);font-size:13px;margin:0 0 6px}
.search{margin:8px 18px 4px;display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 14px}
.search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Archivo';font-size:14px}
.search svg{width:17px;height:17px;color:var(--muted)}
.catrow{display:flex;gap:8px;overflow-x:auto;padding:10px 18px 4px;scrollbar-width:none}
.catrow::-webkit-scrollbar{display:none}
.chip{flex:none;background:var(--card2);border:1px solid var(--line);border-radius:30px;padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:.12s}
.chip.on{background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500;border-color:transparent}
.tcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;margin:10px 18px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.tcard.matched{border-color:rgba(243,144,25,.55);background:linear-gradient(160deg,rgba(243,144,25,.10),var(--card))}
.matchflag{position:absolute;top:0;right:0;background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500;font-family:'Sora';font-weight:700;font-size:10px;padding:3px 9px;border-bottom-left-radius:10px;letter-spacing:.2px}
.tcard:active{transform:scale(.985)}
.tcard.live{border-color:rgba(243,144,25,.4);background:linear-gradient(150deg,rgba(243,144,25,.10),var(--card))}
.tcard.soon{opacity:.74}
.tico{width:46px;height:46px;flex:none;border-radius:13px;display:grid;place-items:center;background:linear-gradient(140deg,var(--ink2),var(--card2));border:1px solid var(--line)}
.tico svg{width:24px;height:24px;color:var(--yellow)}
.tcard.live .tico{background:linear-gradient(140deg,var(--orange2),var(--orange));border:none}
.tcard.live .tico svg{color:#241500}
.tinfo{flex:1;min-width:0}
.tinfo b{font-family:'Sora';font-size:14.5px;display:block;line-height:1.2}
.tinfo span{font-size:11.5px;color:var(--muted);display:block;margin-top:2px}
.tmeta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tmeta .mtag{font-size:9.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 7px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted)}
.tcard.live .tmeta .mtag.go{background:rgba(75,168,75,.2);color:#9be4a3}
.chev{color:var(--muted);font-size:20px;flex:none}
.hubcount{text-align:center;font-size:11.5px;color:var(--muted);padding:10px 0 4px}
.hero{padding:4px 18px 0}
.greet{font-size:13px;color:var(--muted)}
.greetname{font-family:'Sora';font-size:23px;font-weight:800;margin:2px 0 0}
.ringrow{display:flex;align-items:center;gap:16px;margin-top:8px}
.pring{--p:0;width:84px;height:84px;flex:none;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%), rgba(255,255,255,.07) 0);display:grid;place-items:center}
.pring .inner{width:64px;height:64px;border-radius:50%;background:var(--paper);display:grid;place-items:center;text-align:center}
.pring .inner b{font-family:'Sora';font-size:19px}
.pring .inner span{font-size:9px;color:var(--muted);letter-spacing:.5px}
.stat3{display:flex;gap:8px;flex:1}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center}
.stat b{font-family:'Sora';font-size:18px;display:block}
.stat span{font-size:10px;color:var(--muted)}
.tradechip{display:inline-flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line);border-radius:30px;padding:6px 12px;font-size:12px;font-weight:600;margin-top:10px;cursor:pointer}
.tradechip svg{width:14px;height:14px;color:var(--orange)}
.sect{font-family:'Sora';font-weight:700;font-size:13px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:22px 18px 4px}
.mod{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 18px;cursor:pointer;transition:.15s}
.mod:active{transform:scale(.985)}
.mod.locked{opacity:.5}
.mnum{width:42px;height:42px;flex:none;border-radius:12px;display:grid;place-items:center;font-family:'Sora';font-weight:800;font-size:16px;background:linear-gradient(140deg,var(--ink2),var(--card2));border:1px solid var(--line)}
.mod.done .mnum{background:linear-gradient(140deg,var(--green2),var(--green));color:#fff;border:none}
.minfo{flex:1;min-width:0}
.minfo b{font-family:'Sora';font-size:14px;display:block;line-height:1.25}
.minfo span{font-size:11.5px;color:var(--muted)}
.mbar{height:5px;border-radius:5px;background:rgba(255,255,255,.08);margin-top:7px;overflow:hidden}
.mbar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow))}
/* lesson list within module */
.llist{margin:10px 18px}
.lrow{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;margin:8px 0;cursor:pointer;transition:.15s}
.lrow:active{transform:scale(.985)}
.lrow.locked{opacity:.5}
.ldot{width:30px;height:30px;flex:none;border-radius:9px;display:grid;place-items:center;font-family:'Sora';font-weight:700;font-size:13px;background:var(--card2);border:1px solid var(--line);color:var(--muted)}
.lrow.done .ldot{background:linear-gradient(140deg,var(--green2),var(--green));color:#fff;border:none}
.lrow .li{flex:1;min-width:0}
.lrow .li b{font-family:'Sora';font-size:13.5px;display:block;line-height:1.2}
.lrow .li span{font-size:11px;color:var(--muted)}
.lessonhead{padding:16px 18px 0}
.back{background:none;border:none;color:var(--muted);font-family:'Archivo';font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:4px 0}
.obj{background:linear-gradient(150deg,rgba(243,144,25,.12),rgba(75,168,75,.06));border:1px solid var(--line);border-radius:16px;padding:15px;margin:12px 18px}
.obj .pill{margin-bottom:8px}
.obj p{margin:0;font-size:14px;line-height:1.5}
.body{padding:0 18px;font-size:14.5px;line-height:1.62}
.body h4{font-family:'Sora';font-size:15px;margin:18px 0 6px}
.body ul{margin:6px 0;padding-left:18px}
.body li{margin:5px 0}
.body p{margin:8px 0}
.video{margin:14px 18px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#000;aspect-ratio:16/9;display:grid;place-items:center;position:relative;cursor:pointer}
.video .pl{width:54px;height:54px;border-radius:50%;background:rgba(243,144,25,.92);display:grid;place-items:center}
.video .pl::after{content:'';border-left:16px solid #241500;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
.video .vt{position:absolute;bottom:10px;left:12px;font-size:11px;color:#cfe;background:rgba(0,0,0,.5);padding:4px 8px;border-radius:8px}
.video.embed{cursor:pointer;display:grid;place-items:center;padding:0}
.video.embed .vthumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.video.embed .pl{position:relative;z-index:2}
.video.embed .vt{z-index:2}
.video.embed.playing{cursor:default}
.video.embed iframe{display:block;width:100%;height:100%;border:0}
.vidfallback{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);z-index:5;background:rgba(0,0,0,.72);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:7px 14px;font-size:11.5px;font-weight:600;font-family:'Sora';cursor:pointer;white-space:nowrap}
.vidfallback:hover{background:rgba(243,144,25,.9);color:#241500;border-color:transparent}
.videocap{margin:-6px 18px 4px;text-align:right}
.videocap a{color:var(--muted);font-size:11.5px;font-weight:600;text-decoration:none}
.videocap a:hover{color:var(--orange)}
.tip{margin:12px 18px;border-left:3px solid var(--yellow);background:rgba(245,197,24,.08);padding:11px 13px;border-radius:0 12px 12px 0;font-size:13px}
.tip b{color:var(--gold)}
.supbox{margin:12px 18px;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:13px}
.supbox b{font-family:'Sora';font-size:13px}
.suprow{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--line)}
.suprow:last-child{border:none}
.suprow a{color:#8fd3ff;text-decoration:none}
.quizwrap{padding:8px 18px}
.qbrand{display:flex;align-items:center;gap:10px;justify-content:center;margin:6px 0 4px}
.qbrand img{width:30px;height:30px}
.qbrand b{font-family:'Sora';font-size:12px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.qcount{text-align:center;font-size:12px;color:var(--muted);margin-bottom:6px}
.qprog{height:6px;border-radius:6px;background:rgba(255,255,255,.08);margin:0 0 16px;overflow:hidden}
.qprog i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--green));transition:.3s}
.qtag{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#9be4a3;background:rgba(75,168,75,.15);display:inline-block;padding:3px 9px;border-radius:20px;margin-bottom:10px}
.qtag.recall{color:var(--gold);background:rgba(245,197,24,.13)}
.qstem{font-family:'Sora';font-size:17px;font-weight:600;line-height:1.4;margin-bottom:16px}
.opt{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin:9px 0;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:12px;transition:.12s}
.opt:active{transform:scale(.99)}
.opt .k{width:26px;height:26px;flex:none;border-radius:8px;display:grid;place-items:center;font-family:'Sora';font-weight:700;font-size:13px;background:var(--card2);border:1px solid var(--line)}
.opt.correct{border-color:var(--green);background:rgba(75,168,75,.14)}
.opt.correct .k{background:var(--green);color:#fff;border:none}
.opt.wrong{border-color:#d9534f;background:rgba(217,83,79,.13)}
.opt.wrong .k{background:#d9534f;color:#fff;border:none}
.fb{border-radius:14px;padding:14px;margin:12px 0;font-size:13.5px;line-height:1.5;border:1px solid var(--line)}
.fb.ok{background:rgba(75,168,75,.12);border-color:rgba(75,168,75,.35)}
.fb.no{background:rgba(217,83,79,.10);border-color:rgba(217,83,79,.35)}
.fb b{font-family:'Sora'}
.result{padding:30px 22px;text-align:center}
.result .big{font-family:'Sora';font-size:54px;font-weight:800;line-height:1;margin:6px 0}
.cert{margin:18px 0;background:linear-gradient(150deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:18px;padding:22px;position:relative;overflow:hidden}
.cert::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 0,rgba(245,197,24,.18),transparent 50%)}
.cert img{width:54px;height:54px;margin-bottom:8px;position:relative}
.cert .ct{font-family:'Sora';font-weight:800;font-size:18px;position:relative}
.cert .cs{font-size:12px;color:var(--muted);position:relative;margin-top:4px}
.seal{position:absolute;right:16px;top:16px;width:50px;height:50px;border-radius:50%;border:2px solid var(--gold);display:grid;place-items:center;font-size:9px;font-family:'Sora';font-weight:800;color:var(--gold);text-align:center;line-height:1.1;transform:rotate(8deg)}
.soonwrap{padding:8px 18px}
.soonbox{background:var(--card);border:1px dashed var(--line);border-radius:18px;padding:24px;text-align:center;margin-top:8px}
.soonbox .tico{width:64px;height:64px;margin:0 auto 12px;border-radius:18px}
.soonbox .tico svg{width:32px;height:32px}
.soonbox h3{margin:6px 0 4px;font-size:20px}
.soonbox p{color:var(--muted);font-size:13.5px;line-height:1.55;margin:0 auto 4px;max-width:300px}
.outline{text-align:left;margin-top:14px}
.outline .ol{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
.outline .ol:last-child{border:none}
.outline .on{width:26px;height:26px;flex:none;border-radius:8px;background:var(--card2);border:1px solid var(--line);display:grid;place-items:center;font-family:'Sora';font-size:12px;font-weight:700;color:var(--muted)}
.outline .ol b{font-family:'Sora';font-size:13.5px;display:block}
.outline .ol span{font-size:11.5px;color:var(--muted)}
.tabbar{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(10,17,13,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:9px 6px env(safe-area-inset-bottom,9px)}
.tab{flex:1;background:none;border:none;color:var(--muted);font-family:'Archivo';font-size:10.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px}
.tab.on{color:var(--orange)}
.tab svg{width:22px;height:22px}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.confetti{position:absolute;width:9px;height:14px;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(120vh) rotate(540deg);opacity:.2}}
/* ---- read-aloud button ---- */
.readaloud{display:flex;align-items:center;gap:8px;margin:12px 18px;width:calc(100% - 36px);border:1px solid rgba(75,168,75,.35);background:linear-gradient(150deg,rgba(75,168,75,.14),var(--card));color:var(--text);border-radius:14px;padding:12px 14px;font-family:'Sora';font-weight:700;font-size:14px;cursor:pointer;transition:.15s;text-align:left}
.readaloud:active{transform:scale(.98)}
.readaloud .ra-ic{width:34px;height:34px;flex:none;border-radius:50%;display:grid;place-items:center;background:linear-gradient(120deg,var(--green2),var(--green));color:#fff;font-size:16px}
.readaloud.on{border-color:var(--orange);background:linear-gradient(150deg,rgba(243,144,25,.16),var(--card))}
.readaloud.on .ra-ic{background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500}
.readaloud .ra-sub{display:block;font-family:'Archivo';font-weight:500;font-size:11.5px;color:var(--muted);margin-top:2px}
/* ---- translating chat ---- */
.chatfab{position:absolute;right:16px;bottom:104px;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;z-index:40;background:linear-gradient(120deg,var(--green2),var(--green));color:#fff;box-shadow:0 10px 26px -8px rgba(75,168,75,.7);display:grid;place-items:center;font-size:23px;transition:.15s}
.chatfab:active{transform:scale(.93)}
.chatfab .cdot{position:absolute;top:8px;right:9px;width:9px;height:9px;border-radius:50%;background:var(--orange);border:2px solid var(--card)}
.chatsheet{position:absolute;inset:0;z-index:60;background:var(--paper);display:flex;flex-direction:column;animation:sheetup .3s ease}
@keyframes sheetup{from{transform:translateY(100%)}to{transform:none}}
.chathead{display:flex;align-items:center;gap:11px;padding:16px 16px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--card),transparent)}
.chathead .chav{width:40px;height:40px;flex:none;border-radius:50%;background:linear-gradient(120deg,var(--orange),var(--yellow));display:grid;place-items:center;color:#241500;font-family:'Sora';font-weight:800;font-size:16px}
.chathead b{font-family:'Sora';font-size:15px;display:block;line-height:1.1}
.chathead small{color:var(--muted);font-size:11.5px}
.chatx{margin-left:auto;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:17px;cursor:pointer}
.chatbody{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px}
.cmsg{max-width:82%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.4;position:relative}
.cmsg .orig{display:block}
.cmsg .xlate{display:block;margin-top:6px;padding-top:6px;border-top:1px dashed rgba(255,255,255,.18);font-size:12.5px;color:var(--muted);font-style:italic}
.cmsg.me{align-self:flex-end;background:linear-gradient(120deg,var(--green2),var(--green));color:#fff}
.cmsg.me .xlate{color:rgba(255,255,255,.82);border-top-color:rgba(255,255,255,.28)}
.cmsg.them{align-self:flex-start;background:var(--card2);border:1px solid var(--line)}
.cmsg .clabel{display:block;font-family:'Sora';font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;opacity:.7;margin-bottom:4px}
.ctyping{align-self:flex-start;background:var(--card2);border:1px solid var(--line);padding:12px 15px;border-radius:16px;display:flex;gap:4px}
.ctyping i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:cbob 1s infinite}
.ctyping i:nth-child(2){animation-delay:.15s}.ctyping i:nth-child(3){animation-delay:.3s}
@keyframes cbob{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.chatnote{font-size:11px;color:var(--muted);text-align:center;padding:4px 24px 8px}
.chatbar{display:flex;gap:8px;align-items:flex-end;padding:10px 12px calc(env(safe-area-inset-bottom,10px) + 10px);border-top:1px solid var(--line);background:var(--card)}
.chatbar textarea{flex:1;resize:none;background:var(--paper);border:1px solid var(--line);border-radius:14px;color:var(--text);font-family:'Archivo';font-size:14px;padding:11px 13px;max-height:90px;line-height:1.35}
.chatbar textarea:focus{outline:none;border-color:var(--green)}
.chatsend{flex:none;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500;font-size:18px;display:grid;place-items:center}
.chatsend:disabled{opacity:.4;pointer-events:none}
/* ---- boot-camp leaderboard ---- */
.bctrack{display:flex;gap:13px;align-items:flex-start;margin:14px 18px 4px;padding:15px;border-radius:18px;background:linear-gradient(150deg,rgba(245,197,24,.16),rgba(243,144,25,.08),var(--card));border:1px solid rgba(245,197,24,.4);position:relative;overflow:hidden}
.bctrack .bcic{font-size:26px;flex:none;line-height:1}
.bctrack .bcbody{flex:1;min-width:0}
.bctrack b{font-family:'Sora';font-size:14.5px;display:block;margin-bottom:2px}
.bctrack .bcsub{font-size:12.5px;color:var(--muted);display:block;line-height:1.4}
.bcmeter{margin-top:10px;height:9px;border-radius:6px;background:rgba(0,0,0,.3);overflow:hidden}
.bcmeter i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .8s cubic-bezier(.2,.7,.2,1)}
.bcmetatxt{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);font-family:'Sora';font-weight:600}
.bcbtn{margin-top:11px;background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500;border:none;border-radius:12px;padding:10px 14px;font-family:'Sora';font-weight:700;font-size:13px;cursor:pointer;width:100%}
.lbwrap{padding-bottom:20px}
.lbhero{text-align:center;padding:22px 24px 10px}
.lbhero .lbspark{font-size:34px}
.lbhero h2{font-family:'Sora';font-size:23px;font-weight:800;margin:8px 0 4px}
.lbhero p{color:var(--muted);font-size:13.5px;margin:0;line-height:1.5}
.lbtabs{display:flex;gap:8px;margin:14px 18px 6px}
.lbtab{flex:1;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:9px;font-family:'Sora';font-weight:700;font-size:12.5px;cursor:pointer}
.lbtab.on{border-color:var(--orange);color:var(--text);background:linear-gradient(150deg,rgba(243,144,25,.14),var(--card))}
.lbrow{display:flex;align-items:center;gap:12px;margin:9px 18px;padding:13px 14px;background:var(--card);border:1px solid var(--line);border-radius:16px;position:relative}
.lbrow.you{border-color:var(--orange);background:linear-gradient(150deg,rgba(243,144,25,.16),var(--card));box-shadow:0 8px 24px -14px rgba(243,144,25,.7)}
.lbrow.top3 .lbrank{background:linear-gradient(120deg,var(--orange),var(--yellow));color:#241500}
.lbrank{width:34px;height:34px;flex:none;border-radius:11px;display:grid;place-items:center;background:var(--card2);border:1px solid var(--line);font-family:'Sora';font-weight:800;font-size:15px}
.lbnamewrap{flex:1;min-width:0}
.lbname{font-family:'Sora';font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:7px}
.lbflag{font-size:14px}
.lbsub{font-size:11.5px;color:var(--muted);margin-top:1px}
.lbscore{font-family:'Sora';font-weight:800;font-size:18px;color:var(--gold);flex:none;text-align:right}
.lbscore small{display:block;font-family:'Archivo';font-weight:500;font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:right}
.lbcutline{display:flex;align-items:center;gap:10px;margin:14px 18px 8px;color:var(--green);font-family:'Sora';font-weight:700;font-size:12px}
.lbcutline:before,.lbcutline:after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(75,168,75,.5),transparent)}
.lbexplain{margin:12px 18px;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px}
.lbexplain b{font-family:'Sora';font-size:13px;display:block;margin-bottom:8px}
.lbfactor{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
.lbfactor .lfbar{flex:1;height:7px;border-radius:5px;background:rgba(0,0,0,.3);overflow:hidden}
.lbfactor .lfbar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--green2),var(--green))}
.lbfactor .lfval{font-family:'Sora';font-weight:700;font-size:12px;width:42px;text-align:right}
.lbfactor .lflabel{width:104px;color:var(--muted)}
.introbc{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.introbc .ibchip{background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.35);border-radius:30px;padding:7px 13px;font-family:'Sora';font-size:12px;font-weight:700;color:#f5d97a}
</style>
</head>

/* ---------- supplier module 5 (bilingual-lite: shares en/es where provided) ---------- */
function L(en,es){return {en:en,es:es||en};}
/* ============================================================
   TRADE CONTENT LOADER  (hub-and-spoke)
   Heavy per-trade lesson/quiz content now lives in each trade's own .html file in trades/
   and is fetched on demand. The user only ever opens index.html;
   spoke files load invisibly behind the hub.
   ============================================================ */
var ANEW = window.ANEW || (window.ANEW = {});
ANEW.content = ANEW.content || {};          // id -> assembled course object
ANEW._loading = ANEW._loading || {};         // id -> Promise (de-dupe in-flight loads)

/* Spoke files call this when they finish parsing. */
ANEW.registerTrade = function(id, course){
  ANEW.content[id] = course;
};

/* Each trade is its own standalone .html file in trades/. The filenames are
   friendly so the team can recognize and edit them. Add new trades here. */
ANEW.tradeFiles = {
  'mold':     'trades/advanced-mold-making.html',
  'pcb':      'trades/pcb-design.html',
  'embedded': 'trades/embedded-microprocessors.html'
};
/* Map a trade id to its content file. */
ANEW.tradeFile = function(id){
  return ANEW.tradeFiles[id] || ('trades/' + id + '.html');
};

/* Run a trade's content script (the <script id="trade-content"> body) in the
   hub context so it calls ANEW.registerTrade(...). Throws on a script error so
   the caller can show a real message instead of failing silently. */
ANEW._runContent = function(code){
  (0, eval)(code);
};

/* Fetch a trade's standalone .html, pull out its trade-content script, and
   execute it here so the lessons register into this hub. Resolves with the
   registered course (or rejects on network/parse/extract error). */
ANEW.loadTrade = function(id){
  if (ANEW.content[id]) return Promise.resolve(ANEW.content[id]);
  if (ANEW._loading[id]) return ANEW._loading[id];
  var file = ANEW.tradeFile(id);
  var p = fetch(file).then(function(resp){
    if(!resp.ok) throw new Error('Could not load '+file+' ('+resp.status+')');
    return resp.text();
  }).then(function(htmlText){
    var doc = new DOMParser().parseFromString(htmlText, 'text/html');
    var s = doc.getElementById('trade-content');
    if(!s) throw new Error('No lesson content found in '+file);
    try { ANEW._runContent(s.textContent); }
    catch(err){ throw new Error('Lesson content in '+file+' had an error: '+(err&&err.message||err)); }
    if (ANEW.content[id]) return ANEW.content[id];
    throw new Error('"'+file+'" loaded but did not register trade "'+id+'".');
  }).catch(function(err){
    delete ANEW._loading[id];   // allow a later retry to try again cleanly
    throw err;
  });
  ANEW._loading[id] = p;
  return p;
};

/* COURSE is a live getter onto whichever trade is currently active. If that
   trade's content has not loaded yet, return an EMPTY shell for THAT id (never
   another trade's data) so a load problem shows up as empty rather than as the
   wrong trade's lessons. */
Object.defineProperty(window, 'COURSE', {
  configurable:true,
  get:function(){
    var id = (window.state && state.trade) ? state.trade : 'mold';
    if (ANEW.content[id]) return ANEW.content[id];
    var tr = (typeof TRADES!=='undefined') ? TRADES.find(function(x){return x.id===id;}) : null;
    var ttl = tr ? tr.title : id;
    return {id:id, title:(typeof L==='function'?L(ttl,ttl):{en:ttl,es:ttl}), modules:[]};
  }
});

const state = {
  screen:'lang', lang:null, tab:'home',
  trade:null, cat:'all', query:'',
  activeModule:null, activeLesson:null,
  inQuiz:false, qi:0, answered:false, picked:null, qscore:0,
  lessonDone:{}, streak:7,
  intro:0, profile:{name:'', lastName:'', dial:'+44', phone:'', email:'', guardDial:'+44', guardPhone:'', guardConsent:false, consent:false, saved:false, matches:[], survey:{}, scores:{}, bestScores:{}, firstScores:{}, activeDays:[], chat:[]},

// Restore a saved learner profile if the browser allows it (best-effort; harmless if blocked)
try{ const p=JSON.parse(localStorage.getItem('anew_profile')||'null'); if(p&&typeof p==='object'){state.profile=Object.assign(state.profile,p);} }catch(e){}
function saveProfile(){ try{ localStorage.setItem('anew_profile', JSON.stringify(state.profile)); }catch(e){} }
function firstName(){ return (state.profile.name||'').trim().split(/\s+/)[0]||''; }

/* ===================== Read-aloud (text-to-speech) =====================
   Uses the browser's built-in speechSynthesis. No API, no cost, no files.
   Picks a voice matching the learner's selected language where one exists. */
const TTS_LOCALE = { en:'en-GB', es:'es-ES', pt:'pt-BR', fr:'fr-FR', de:'de-DE', hi:'hi-IN' };
function ttsSupported(){ return typeof window!=='undefined' && 'speechSynthesis' in window; }
/* Score a voice for how natural it is likely to sound. Higher = better.
   Modern browsers ship high-quality "neural/natural" voices alongside the old
   robotic defaults; we explicitly prefer the good ones and avoid the robotic ones. */
function voiceQuality(v){
  const n=((v && v.name)||'').toLowerCase();
  const lng=((v && v.lang)||'').toLowerCase();
  let s=0;
  // Strongly preferred high-quality engines / labels
  if(n.includes('natural')) s+=60;            // Microsoft "... Natural" neural voices
  if(n.includes('neural')) s+=60;
  if(n.includes('google')) s+=45;             // Google voices sound markedly better
  if(n.includes('premium')||n.includes('enhanced')) s+=40;
  if(n.includes('siri')) s+=40;               // Apple Siri voices
  // Apple's named higher-quality voices
  if(/(samantha|ava|allison|serena|zoe|nora|isha|moira|tessa|karen|daniel|arthur|aaron|nicky|paloma|mónica|monica|jorge|juan)/.test(n)) s+=30;
  // --- British accent preference ---
  // Boost voices that are British English by language tag...
  if(lng==='en-gb') s+=70;
  // ...and well-known British voice names (Apple: Daniel/Kate/Serena/Arthur/Oliver;
  // Microsoft: Libby/Sonia/Ryan/Hazel/George/Susan; Google UK English).
  if(/(daniel|kate|serena|arthur|oliver|libby|sonia|ryan|hazel|george|susan|maisie|thomas|stephanie|british|united kingdom|\(uk\)|english \(great britain\))/.test(n)) s+=35;
  if(n.includes('google') && (n.includes('uk') || lng==='en-gb')) s+=20; // "Google UK English"
  // Penalise the classic robotic / compact / eSpeak-style defaults
  if(n.includes('espeak')) s-=40;
  if(n.includes('compact')) s-=15;
  if(/(microsoft (david|zira|mark|james)\b)/.test(n)) s-=10; // older US non-neural MS voices
  if(n.includes('fred')||n.includes('albert')||n.includes('zarvox')||n.includes('robot')) s-=50;
  // Prefer voices the OS marks as local (usually higher fidelity than fallback)
  if(v && v.localService) s+=8;
  if(v && v.default) s+=4;
  return s;
}
function pickVoice(locale){
  try{
    const vs = window.speechSynthesis.getVoices()||[];
    if(!vs.length) return null;
    const lang = locale.toLowerCase();
    const base = lang.split('-')[0];
    // Candidates that match the language (exact locale first, then base language).
    let cands = vs.filter(v=>v.lang && v.lang.toLowerCase()===lang);
    if(!cands.length) cands = vs.filter(v=>v.lang && v.lang.toLowerCase().startsWith(base));
    if(!cands.length) return null;
    // Pick the highest-quality candidate; exact-locale matches edge out base matches.
    cands.sort((a,b)=>{
      const qb=voiceQuality(b)+(b.lang.toLowerCase()===lang?5:0);
      const qa=voiceQuality(a)+(a.lang.toLowerCase()===lang?5:0);
      return qb-qa;
    });
    return cands[0]||null;
  }catch(e){ return null; }
}
function lessonReadText(l){
  // Build a clean, spoken version of the current lesson in the active language.
  // Proper sentence punctuation gives the synthesizer natural phrasing and pauses,
  // instead of one long monotone run-on.
  function sentence(s){
    s=(s||'').trim();
    if(!s) return '';
    // Ensure it ends with terminal punctuation so the voice falls/pauses naturally.
    if(!/[.!?:;\u3002\uFF01\uFF1F]$/.test(s)) s+='.';
    return s;
  }
  let parts=[];
  // Title, then a longer pause (em dash reads as a pause), then objective.
  const title=sentence(tr(l.title));
  if(title) parts.push(title);
  if(l.obj) parts.push(sentence(tr(l.obj)));
  (l.body||[]).forEach(b=>{
    if(b.h) parts.push(sentence(tr(b.h)));
    if(b.p) parts.push(sentence(tr(b.p)));
    if(b.ul) b.ul.forEach(li=>parts.push(sentence(tr(li))));
  });
  if(l.tip) parts.push(sentence(tr(l.tip)));
  return parts.filter(Boolean);
}
function stopReading(){
  // Invalidate any in-flight sentence queue, then cancel the synth.
  state.readToken=(state.readToken||0)+1;
  state.readQueue=[];
  if(ttsSupported()){ try{ window.speechSynthesis.cancel(); }catch(e){} }
  state.reading=false;
  const btn=document.getElementById('readaloud'); if(btn) updateReadBtn(btn);
}
function updateReadBtn(btn){
  const on=state.reading;
  btn.className='readaloud'+(on?' on':'');
  btn.innerHTML=`<span class="ra-ic">${on?'\u23F8':'\uD83D\uDD0A'}</span>
    <span>${on?t('raStop'):t('raPlay')}<span class="ra-sub">${on?t('raStopSub'):t('raPlaySub')}</span></span>`;
}
function toggleRead(){
  if(!ttsSupported()){ toast(t('raPlay')+' \u2014 \u2715'); return; }
  if(state.reading){ stopReading(); return; }
  const m=COURSE.modules.find(x=>x.id===state.activeModule);
  const l=m&&m.lessons.find(x=>x.id===state.activeLesson);
  if(!l) return;
  const locale=TTS_LOCALE[state.lang]||'en-US';
  const v=pickVoice(locale);
  const parts=lessonReadText(l);                 // array of sentences
  if(!parts.length) return;

  // Speak each sentence as its own utterance. This produces more natural
  // prosody (rise/fall per sentence) and small breaths between sentences than
  // one long monotone utterance, and lets us stop cleanly at any point.
  state.readQueue = parts.slice();
  state.readToken = (state.readToken||0)+1;
  const myToken = state.readToken;

  function speakNext(){
    if(myToken!==state.readToken) return;        // a newer read/stop superseded us
    if(!state.readQueue.length){
      state.reading=false; const b=document.getElementById('readaloud'); if(b) updateReadBtn(b); return;
    }
    const text=state.readQueue.shift();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=locale;
    if(v){ try{ u.voice=v; }catch(e){} }       // never let a bad voice stop the read
    u.rate=0.92;                                 // a touch slower reads more naturally
    u.pitch=1.0;
    u.volume=1.0;
    u.onend=()=>{ if(myToken===state.readToken){ setTimeout(speakNext, 180); } }; // gentle pause between sentences
    u.onerror=()=>{ if(myToken===state.readToken){ setTimeout(speakNext, 120); } };
    try{ window.speechSynthesis.speak(u); }catch(e){}
  }

  try{
    window.speechSynthesis.cancel();
    state.reading=true;
    speakNext();                                 // start speaking first
    try{ sfx('tap'); }catch(e){}                 // tap sound must never block speech
  }catch(e){ state.reading=false; }
  const btn=document.getElementById('readaloud'); if(btn) updateReadBtn(btn);
}
// Voices load asynchronously in many browsers; prime the list and keep it fresh so
// the highest-quality voice is available the first time the learner taps play.
if(ttsSupported()){
  try{
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=function(){ try{ window.speechSynthesis.getVoices(); }catch(e){} };
  }catch(e){}
}

/* ===================== Translating instructor chat =====================
   Student writes in their language; we translate to English for the instructor,
   the instructor replies (in English), and we translate that back to the student.
   Translation + the demo instructor reply use the in-app Claude API (no key needed
   inside Claude.ai artifacts). A real deployment routes the English text to a live
   instructor instead of the demo responder \u2014 see strategy report (phase 2). */
const LANG_NAME = { en:'English', es:'Spanish', pt:'Portuguese', fr:'French', de:'German', hi:'Hindi' };
async function callClaude(system, user){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:1000,
      system: system,
      messages:[{role:'user', content:user}]
    })
  });
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
}
async function translateText(text, fromName, toName){
  if(fromName===toName) return text;
  const sys=`You are a translation engine for a manufacturing training app. Translate the user's message from ${fromName} to ${toName}. Reply with ONLY the translation \u2014 no quotes, no notes, no preamble.`;
  try{ const out=await callClaude(sys, text); return out||text; }catch(e){ return text; }
}

async function sendChat(){

/* ===================== Boot-camp scoring & leaderboard =====================
   Balanced score = Mastery + Consistency + Growth (each 0-100, weighted).
   - Mastery:     average of best quiz scores across attempted lessons
   - Consistency: lessons completed (coverage) blended with the day streak
   - Growth:      how much best scores improved over first attempts
   This rewards the coachable, committed learners sponsors fund \u2014 not just
   one-shot test takers. Tunable weights below. */
const SCORE_W = { mastery:0.5, consistency:0.3, growth:0.2 };
function markActiveToday(){
  const d=new Date().toISOString().slice(0,10);
  state.profile.activeDays=state.profile.activeDays||[];
  if(!state.profile.activeDays.includes(d)) state.profile.activeDays.push(d);
}
function recordQuiz(modId, lesId, scorePct){
  const k=modId+':'+lesId;
  state.profile.scores=state.profile.scores||{};
  state.profile.bestScores=state.profile.bestScores||{};
  state.profile.firstScores=state.profile.firstScores||{};
  if(state.profile.firstScores[k]===undefined) state.profile.firstScores[k]=scorePct;
  state.profile.bestScores[k]=Math.max(state.profile.bestScores[k]||0, scorePct);
  state.profile.scores[k]=scorePct;
  markActiveToday();
}
function masteryScore(){
  const best=state.profile.bestScores||{}; const vals=Object.values(best);
  if(!vals.length) return 0;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function consistencyScore(){
  const total=lessonsTotal()||1;
  const coverage=Math.min(1, lessonsCompleted()/total);          // breadth of progress
  const streakPart=Math.min(1, (state.streak||0)/14);            // habit (caps at 2 weeks)
  return Math.round((coverage*0.65 + streakPart*0.35)*100);
}
function growthScore(){
  const first=state.profile.firstScores||{}; const best=state.profile.bestScores||{};
  const keys=Object.keys(first); if(!keys.length) return 0;
  // average improvement from first to best, scaled; learners who started behind and
  // improved are rewarded. A solid first-pass still earns a baseline.
  let sum=0;
  keys.forEach(k=>{ const f=first[k]||0,b=best[k]||0; const imp=Math.max(0,b-f); sum+=Math.min(100, imp*2 + f*0.4); });
  return Math.round(sum/keys.length);
}
function bootcampScore(){
  const m=masteryScore(), c=consistencyScore(), g=growthScore();
  return Math.round(m*SCORE_W.mastery + c*SCORE_W.consistency + g*SCORE_W.growth);
}

/* ===================== Audio engine (Web Audio API, no files, royalty-free) =====================
   Browsers block sound until a user gesture, so audio starts on the first tap.
   A mute toggle is always available; preference is remembered. */
const AUDIO = {
  ctx:null, master:null, musicGain:null, musicTimer:null, started:false,
  muted:(function(){ try{ return localStorage.getItem('anew_muted')==='1'; }catch(e){ return false; } })(),
};
function audioInit(){
  if(AUDIO.ctx) return;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    AUDIO.ctx = new AC();
    AUDIO.master = AUDIO.ctx.createGain();
    AUDIO.master.gain.value = AUDIO.muted ? 0 : 0.9;
    AUDIO.master.connect(AUDIO.ctx.destination);
    AUDIO.musicGain = AUDIO.ctx.createGain();
    AUDIO.musicGain.gain.value = 0.16;
    AUDIO.musicGain.connect(AUDIO.master);
  }catch(e){ AUDIO.ctx=null; }
}
function audioResume(){ if(AUDIO.ctx && AUDIO.ctx.state==='suspended'){ AUDIO.ctx.resume().catch(()=>{}); } }
// one synthesized note
function tone(freq, t0, dur, type, peak, target){
  const c=AUDIO.ctx; if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(target||AUDIO.master);
  o.start(t0); o.stop(t0+dur+0.02);
}
// short UI sound effects
function sfx(kind){
  audioInit(); if(!AUDIO.ctx || AUDIO.muted) return; audioResume();
  const c=AUDIO.ctx, n=c.currentTime;
  if(kind==='tap'){ tone(523.25,n,0.12,'sine',0.18); }
  else if(kind==='select'){ tone(587.33,n,0.12,'triangle',0.18); tone(880,n+0.05,0.12,'sine',0.12); }
  else if(kind==='section'){ // passing a section: a rising 3-note sparkle
    tone(523.25,n,0.16,'triangle',0.16); tone(659.25,n+0.09,0.16,'triangle',0.16); tone(783.99,n+0.18,0.22,'sine',0.16);
  }
  else if(kind==='success'){ // correct answer / module finish
    tone(659.25,n,0.16,'sine',0.18); tone(987.77,n+0.12,0.28,'sine',0.16);
  }
  else if(kind==='wrong'){ tone(311.13,n,0.22,'sawtooth',0.10); }
}
// The licensed intro song, embedded as a data URI (injected at build).
const SONG_SRC = "trades/intro-song.m4a";  /* externalized; was an inline data: URI */
function hasSong(){ return typeof SONG_SRC==="string" && SONG_SRC.length>0; };
let songEl=null, songFellBack=false;
function songSetup(){
  if(songEl) return songEl;
  songEl=document.getElementById('introsong');
  if(songEl && SONG_SRC){
    try{ songEl.src=SONG_SRC; songEl.volume = AUDIO.muted?0:0.9; }catch(e){}
    try{ songEl.addEventListener('ended', ()=>{ if(state.screen==='intro'){ clearIntroTimers(); endIntro(); } }); }catch(e){}
    // If the embedded audio can't be decoded in this browser, switch to the
    // always-available synth music so the learner still hears sound.
    try{ songEl.addEventListener('error', ()=>{
      if(!songFellBack && !AUDIO.muted){ songFellBack=true; synthMusicStart(); }
    }); }catch(e){}
  }
  return songEl;
}
// Start the intro music: prefer the embedded song; fall back to the synth loop if it can't play.
function armSongOnNextTap(){
  // If the browser blocked autoplay, start the SAME song on the user's next tap.
  if(AUDIO._armed) return;
  AUDIO._armed=true;
  const go=()=>{
    AUDIO._armed=false;
    document.removeEventListener('pointerdown', go, true);
    document.removeEventListener('touchstart', go, true);
    document.removeEventListener('keydown', go, true);
    try{ audioInit(); audioResume(); }catch(e){}
    const el=songSetup();
    if(el){ try{ el.volume=AUDIO.muted?0:0.9; el.play().catch(()=>{}); AUDIO.started=true; }catch(e){} }
  };
  document.addEventListener('pointerdown', go, true);
  document.addEventListener('touchstart', go, true);
  document.addEventListener('keydown', go, true);
}
function musicStart(){
  audioInit(); audioResume();
  // If a previous attempt already determined the embedded song can't play
  // in this browser, go straight to the always-works synth music.
  if(songFellBack){ synthMusicStart(); return; }
  const el=songSetup();
  if(el && hasSong()){
    try{
      el.currentTime=0; el.volume = AUDIO.muted?0:0.9;
      const p=el.play();
      if(p && p.catch){
        p.catch((err)=>{
          // NotAllowedError => autoplay was blocked: retry the SAME song on next tap.
          // Anything else (NotSupportedError / decode failure) => use the synth fallback.
          if(err && err.name==='NotAllowedError'){ armSongOnNextTap(); }
          else { songFellBack=true; synthMusicStart(); }
        });
      }
      AUDIO.started=true;
      return;
    }catch(e){ songFellBack=true; synthMusicStart(); return; }
  }
  // Embedded song genuinely unavailable.
  songFellBack=true; synthMusicStart();
}
/* Resume the song WITHOUT restarting it (used for section transitions so it plays continuously). */
function musicResume(){
  audioInit(); audioResume();
  if(songFellBack){ synthMusicStart(); return; }
  const el=songSetup();
  if(el && hasSong()){
    if(AUDIO.muted){ try{ el.volume=0; }catch(e){} }
    else { try{ el.volume=0.9; }catch(e){} }
    if(el.paused){
      try{
        const p=el.play();
        if(p&&p.catch){ p.catch((err)=>{ if(err && err.name==='NotAllowedError'){ armSongOnNextTap(); } else { songFellBack=true; synthMusicStart(); } }); }
        AUDIO.started=true;
      }
      catch(e){ songFellBack=true; synthMusicStart(); }
    }
  } else if(!hasSong()){
    synthMusicStart();
  }
}
function musicStop(){
  if(songEl){ try{ songEl.pause(); }catch(e){} }
  synthMusicStop();
}
// gentle looping ambient melody (no copyright) — used only if the embedded song can't play
function synthMusicStart(){
  audioInit(); if(!AUDIO.ctx) return; audioResume();
  if(AUDIO.musicTimer) return;
  const scale=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
  const bass=[130.81,164.81,196.00,174.61];
  let step=0; const beat=0.46;
  function loop(){
    if(!AUDIO.ctx) return;
    const t=AUDIO.ctx.currentTime+0.05;
    const mf=scale[(step*3+ (step%2?2:0))%scale.length];
    tone(mf, t, beat*1.6, 'triangle', 0.5, AUDIO.musicGain);
    if(step%2===0) tone(mf*1.5, t+0.08, beat*1.2, 'sine', 0.25, AUDIO.musicGain);
    if(step%2===0) tone(bass[(step/2|0)%bass.length], t, beat*2.0, 'sine', 0.6, AUDIO.musicGain);
    step++;
    AUDIO.musicTimer=setTimeout(loop, beat*1000);
  }
  loop(); AUDIO.started=true;
}
function synthMusicStop(){ if(AUDIO.musicTimer){ clearTimeout(AUDIO.musicTimer); AUDIO.musicTimer=null; } }
function toggleMute(){
  AUDIO.muted=!AUDIO.muted;
  try{ localStorage.setItem('anew_muted', AUDIO.muted?'1':'0'); }catch(e){}
  audioInit();
  if(AUDIO.master){ AUDIO.master.gain.value = AUDIO.muted?0:0.9; }
  if(songEl){ songEl.volume = AUDIO.muted?0:0.9; }
  if(!AUDIO.muted){
    audioResume();
    // If we're not on a video lesson, (re)start the music so unmuting is audible.
    var onLesson = (typeof state!=='undefined' && state.screen==='course' && state.activeLesson);
    if(!onLesson){ try{ if(AUDIO.started){ musicResume(); } else { musicStart(); } }catch(e){} }
  } else {
    // Muting: also stop the synth loop so it doesn't keep scheduling silently.
    synthMusicStop();
  }
  document.querySelectorAll('.mutebtn').forEach(b=>{ b.textContent = AUDIO.muted?'\uD83D\uDD07':'\uD83D\uDD0A'; });
}
function muteBtnHTML(){ return `<button class="mutebtn" onclick="event.stopPropagation();toggleMute()" aria-label="Sound on/off">${AUDIO.muted?'\uD83D\uDD07':'\uD83D\uDD0A'}</button>`; }

function lessonKey(modId,lesId){return modId+':'+lesId;}

function moduleProgress(mod){
  const ls=mod.lessons||[]; const done=ls.filter(l=>lessonPassed(mod.id,l.id)).length;
  return {done,total:ls.length,pct: ls.length>0 ? Math.round(done/ls.length*100) : 0};
}
function lessonUnlocked(mod,idx){ if(idx===0)return true; return lessonPassed(mod.id,mod.lessons[idx-1].id); }
function moduleUnlocked(i){ if(i===0)return true; const prev=COURSE.modules[i-1]; return moduleProgress(prev).pct===100; }
function coursePct(){
  let d=0,tot=0; COURSE.modules.forEach(m=>{const p=moduleProgress(m);d+=p.done;tot+=p.total;});
  return tot>0 ? Math.round(d/tot*100) : 0;
}

// Build an SVG for a "how" slide whose icon string may mix path data with circle:/rect: tokens
function introHowSvg(spec){
  let out='';
  spec.split('|').forEach(seg=>{
    if(seg.startsWith('circle:')){const[cx,cy,r]=seg.slice(7).split(',');out+=`<circle cx="${cx}" cy="${cy}" r="${r}"/>`;}
    else if(seg.startsWith('rect:')){const[x,y,w,h,rx]=seg.slice(5).split(',');out+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}"/>`;}
    else out+=`<path d="${seg}"/>`;
  });
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${out}</svg>`;
}
// trades belonging to a family category, with their individual icons

  }
  app.innerHTML=`<div class="introwrap">
    <div class="introtop">

        <button class="btn" onclick="introNext()">${last?t('introStart'):t('introNext')}</button>
      </div>
    </div>
  </div>`;
  // Animate the per-trade cards on family slides (each trade gets its moment)
  if(fam){
    const cards=[...document.querySelectorAll('#famtrades .famtrade')];
    if(cards.length>1){
      let a=0;

  }
  // Drive the whole sequence to the song length. If the song is playing, sync slide changes
  // to the song's real time so the intro spans the full track and ends with it.
  startIntroTimeline();
  /* Start the song when the first intro slide ("Designed for grades 6\u201312") appears. */
  if(state.intro===0 && !AUDIO.started && !AUDIO.muted){ try{ audioInit(); audioResume(); musicStart(); }catch(e){} }

// Each slide gets an equal share of the song; when the song plays we follow its clock.
function startIntroTimeline(){
  const total=INTRO_SLIDES.length;
  const perSlide=SONG_DURATION/total; // ~20.8s per slide across the song
  const bar=document.getElementById('introprogbar');
  const el=songEl;
  const usingSong = el && hasSong() && !songFellBack && !el.paused;
  if(usingSong){
    // follow the song clock: advance when we cross each slide boundary; fill progress bar
    introClock=setInterval(()=>{
      if(state.screen!=='intro'){clearIntroTimers();return;}
      const ct=el.currentTime||0;
      const target=Math.min(total-1, Math.floor(ct/perSlide));
      if(bar){ bar.style.width=Math.min(100,(ct/SONG_DURATION)*100)+'%'; }
      if(el.ended || ct>=SONG_DURATION-0.5){ clearIntroTimers(); endIntro(); return; }
      if(target>state.intro){ state.intro=target; renderIntro(); introSlideSound(); }
    }, 250);
  } else {
    // no song (muted/blocked/fallback): use a comfortable fixed pace with a progress bar
    const dur=INTRO_SLIDES[state.intro].kind==='fam'?7000:5200;
    let t0=Date.now();
    introClock=setInterval(()=>{
      if(state.screen!=='intro'){clearIntroTimers();return;}
      const frac=Math.min(1,(Date.now()-t0)/dur);
      if(bar){ bar.style.width=(((state.intro+frac)/INTRO_SLIDES.length)*100)+'%'; }
    },120);
    introTimer=setTimeout(()=>{ if(state.screen==='intro'){ introNext(); } }, dur);
  }
}
function endIntro(){ sfx('success'); state.screen='signup'; render(); musicResume(); }
function introSlideSound(){
  const s=INTRO_SLIDES[state.intro];
  if(s && s.kind==='fam') sfx('section'); else sfx('tap');
}
function introNext(){
  clearIntroTimers();
  if(state.intro<INTRO_SLIDES.length-1){state.intro++;renderIntro();introSlideSound();}
  else { endIntro(); }
}
function introPrev(){
  clearIntroTimers();
  if(state.intro>0){state.intro--;renderIntro();introSlideSound();}
  else { renderIntro(); }
}
function introGo(k){
  clearIntroTimers();
  state.intro=k; renderIntro(); introSlideSound();
}
function introSkip(){
  clearIntroTimers();
  sfx('tap');

  try{ if(!AUDIO.muted){ if(AUDIO.started){ musicResume(); } else { musicStart(); } } }catch(e){}
}

  const hasGuardPhone=(p.guardPhone||'').replace(/[^0-9]/g,'').length>=6;

  suErr('');
  p.saved=true; saveProfile();

  else { startSurvey(); }
  render(); app.scrollTop=0;
}

function openTrade(id){
  /* keep the ambient music playing through the learner/course browsing area;
     it is paused only on an actual video lesson (see openLesson). */
  try{ if(!AUDIO.muted){ if(AUDIO.started){ musicResume(); } else { musicStart(); } } }catch(e){}
  const tr=TRADES.find(x=>x.id===id);
  if(tr && tr.preview){
    /* Preview trade: curriculum is still in development. Go straight to the
       course home, which shows the planned syllabus (no lesson content loads). */
    state.trade=id;state.screen='course';state.tab='home';
    state.activeModule=null;state.activeLesson=null;state.inQuiz=false;
    render();app.scrollTop=0;
    return;
  }
  if(tr && tr.live){
    /* Live trades are content-backed: their lesson/quiz data lives in
       each trade's own .html file in trades/ and is fetched on demand. Show a
       brief loader, then open the course once the file has registered its content. */
    if(ANEW.content[id]){
      state.trade=id;state.screen='course';state.tab='home';
      state.activeModule=null;state.activeLesson=null;state.inQuiz=false;
      render();app.scrollTop=0;
      return;
    }
    state.trade=id;state.screen='loadingTrade';render();app.scrollTop=0;
    ANEW.loadTrade(id).then(function(){
      if(state.trade!==id) return; // user navigated away while loading
      state.screen='course';state.tab='home';
      state.activeModule=null;state.activeLesson=null;state.inQuiz=false;
      render();app.scrollTop=0;
    }).catch(function(err){
      if(state.trade!==id) return;
      state.loadError=(err&&err.message)||String(err);
      state.screen='loadError';render();app.scrollTop=0;
    });
  }
  else {state.trade=id;state.screen='tradesoon';render();app.scrollTop=0;}
}
