'use strict';

/* ----- Module 1: Material Science Foundations ----- */
const M1 = {"id": "m1", "title": {"en": "Material Science Foundations", "es": "Fundamentos de Ciencia de Materiales"}, "sub": {"en": "10 lessons · Level 1", "es": "10 lecciones · Nivel 1"}, "lessons": [{"id": "m1l1", "video": "tKt1NumnLqs", "title": {"en": "Molding Processes Overview", "es": "Panorama de Procesos de Moldeo"}, "obj": {"en": "Name the major plastic molding processes and match each to the kind of part it makes best.", "es": "Nombrar los principales procesos de moldeo de plástico y asociar cada uno con el tipo de pieza que mejor produce."}, "body": [{"h": {"en": "What plastic molding is", "es": "Qué es el moldeo de plástico"}}, {"p": {"en": "Plastic molding shapes plastic material into a desired form using a mold. Each process has unique benefits that only that process can achieve.", "es": "El moldeo de plástico da forma al material plástico mediante un molde. Cada proceso tiene beneficios únicos que solo él puede lograr."}}, {"h": {"en": "The main processes", "es": "Los procesos principales"}}, {"ul": [{"en": "Injection molding — molten plastic injected into a cavity under high pressure; complex shapes, tight tolerances, high volume.", "es": "Moldeo por inyección — plástico fundido inyectado en una cavidad a alta presión; formas complejas, tolerancias ajustadas, alto volumen."}, {"en": "Blow molding — air inflates a molten tube (parison) into a hollow part like a bottle.", "es": "Moldeo por soplado — el aire infla un tubo fundido (paríson) para formar una pieza hueca como una botella."}, {"en": "Thermoforming / pressure forming — a heated plastic sheet is formed over a mold; pressure forming adds air pressure for finer detail.", "es": "Termoformado / formado a presión — una lámina plástica caliente se forma sobre un molde; el formado a presión añade presión de aire para más detalle."}, {"en": "Rotational molding — a mold rotates while heated to make large hollow parts with uniform walls (tanks, kayaks).", "es": "Moldeo rotacional — el molde gira mientras se calienta para hacer piezas huecas grandes de pared uniforme (tanques, kayaks)."}, {"en": "Extrusion — plastic is pushed through a die to make a continuous profile (pipe, sheet, film).", "es": "Extrusión — el plástico se empuja a través de un dado para hacer un perfil continuo (tubo, lámina, película)."}, {"en": "Gas assist — gas injected into the melt reduces weight and material in thick sections.", "es": "Asistido por gas — el gas inyectado en la masa fundida reduce peso y material en secciones gruesas."}, {"en": "Compression molding — preheated material pressed in a cavity; used for large, strong parts, often thermosets.", "es": "Moldeo por compresión — material precalentado prensado en una cavidad; para piezas grandes y resistentes, a menudo termoestables."}]}], "tip": {"en": "The best engineering support comes from suppliers that build the equipment or supply the raw materials.", "es": "El mejor soporte de ingeniería viene de los proveedores que fabrican el equipo o suministran la materia prima."}, "quiz": [{"tag": "check", "stem": {"en": "Which process inflates a molten tube of plastic to form a hollow part such as a bottle?", "es": "¿Qué proceso infla un tubo de plástico fundido para formar una pieza hueca como una botella?"}, "opts": [{"en": "Injection molding", "es": "Moldeo por inyección"}, {"en": "Blow molding", "es": "Moldeo por soplado"}, {"en": "Extrusion", "es": "Extrusión"}, {"en": "Compression molding", "es": "Moldeo por compresión"}], "a": 1, "fb": {"en": "Blow molding inflates a parison like a balloon into a hollow shape.", "es": "El moldeo por soplado infla un paríson como un globo para formar una forma hueca."}}, {"tag": "check", "stem": {"en": "You need a large, hollow tank with uniform wall thickness. Which process fits best?", "es": "Necesitas un tanque grande y hueco con espesor de pared uniforme. ¿Qué proceso encaja mejor?"}, "opts": [{"en": "Rotational molding", "es": "Moldeo rotacional"}, {"en": "Injection molding", "es": "Moldeo por inyección"}, {"en": "Thermoforming", "es": "Termoformado"}, {"en": "Gas assist", "es": "Asistido por gas"}], "a": 0, "fb": {"en": "Rotational molding makes large hollow parts with uniform walls, like tanks and kayaks.", "es": "El moldeo rotacional hace piezas huecas grandes con paredes uniformes, como tanques y kayaks."}}, {"tag": "check", "stem": {"en": "Which process pushes plastic through a die to create a continuous profile like pipe?", "es": "¿Qué proceso empuja el plástico a través de un dado para crear un perfil continuo como un tubo?"}, "opts": [{"en": "Blow molding", "es": "Moldeo por soplado"}, {"en": "Extrusion", "es": "Extrusión"}, {"en": "Rotational molding", "es": "Moldeo rotacional"}, {"en": "Injection molding", "es": "Moldeo por inyección"}], "a": 1, "fb": {"en": "Extrusion forces plastic through a die for continuous shapes: pipe, sheet, film.", "es": "La extrusión fuerza el plástico por un dado para formas continuas: tubo, lámina, película."}}]}, {"id": "m1l2", "video": "T_YAZYqQBU4", "title": {"en": "Thermoplastic vs. Thermoset", "es": "Termoplástico vs. Termoestable"}, "obj": {"en": "Explain the core difference between thermoplastics and thermosets and the consequences for recycling and reshaping.", "es": "Explicar la diferencia central entre termoplásticos y termoestables y sus consecuencias para el reciclaje y el reformado."}, "body": [{"p": {"en": "Thermoplastics can be melted and reshaped repeatedly without changing their chemical structure — they have shape memory.", "es": "Los termoplásticos pueden fundirse y reformarse repetidamente sin cambiar su estructura química — tienen memoria de forma."}}, {"p": {"en": "Thermosets are mixed with a curing agent and harden irreversibly when heated. Once cured they cannot be melted or reshaped.", "es": "Los termoestables se mezclan con un agente de curado y endurecen de forma irreversible al calentarse. Una vez curados no pueden fundirse ni reformarse."}}, {"h": {"en": "Trade-offs", "es": "Compensaciones"}}, {"ul": [{"en": "Strength: thermosets typically higher; thermoplastics typically lower.", "es": "Resistencia: los termoestables suelen ser más altos; los termoplásticos más bajos."}, {"en": "Cost: thermosets cost more (need a curing agent); thermoplastics are cheaper to process.", "es": "Costo: los termoestables cuestan más (necesitan agente de curado); los termoplásticos son más baratos de procesar."}, {"en": "Recycling: thermosets generally cannot be recycled once cured; thermoplastics can be recycled multiple times.", "es": "Reciclaje: los termoestables generalmente no se reciclan una vez curados; los termoplásticos se reciclan varias veces."}]}], "quiz": [{"tag": "check", "stem": {"en": "Once cured, can a thermoset part be melted and reshaped?", "es": "Una vez curada, ¿se puede fundir y reformar una pieza termoestable?"}, "opts": [{"en": "Yes, like any plastic", "es": "Sí, como cualquier plástico"}, {"en": "No — it hardens irreversibly", "es": "No — endurece de forma irreversible"}], "a": 1, "fb": {"en": "Thermosets have no shape memory. Only thermoplastics can be remelted.", "es": "Los termoestables no tienen memoria de forma. Solo los termoplásticos pueden refundirse."}}, {"tag": "check", "stem": {"en": "Which material type can generally be recycled multiple times?", "es": "¿Qué tipo de material generalmente se puede reciclar varias veces?"}, "opts": [{"en": "Thermoset", "es": "Termoestable"}, {"en": "Thermoplastic", "es": "Termoplástico"}], "a": 1, "fb": {"en": "Thermoplastics can be remelted and recycled; cured thermosets generally cannot.", "es": "Los termoplásticos pueden refundirse y reciclarse; los termoestables curados generalmente no."}}, {"tag": "check", "stem": {"en": "Why do thermosets often cost more to manufacture?", "es": "¿Por qué los termoestables suelen costar más de fabricar?"}, "opts": [{"en": "They need a curing agent or catalyst", "es": "Necesitan un agente de curado o catalizador"}, {"en": "They are always imported", "es": "Siempre se importan"}, {"en": "They require gold tooling", "es": "Requieren herramental de oro"}, {"en": "They cannot be colored", "es": "No se pueden colorear"}], "a": 0, "fb": {"en": "The curing agent and the irreversible cure step add cost versus simple remelting.", "es": "El agente de curado y el paso de curado irreversible añaden costo frente a la simple refundición."}}]}, {"id": "m1l3", "title": {"en": "Thermoset Moldable Materials", "es": "Materiales Termoestables Moldeables"}, "obj": {"en": "Recognize common thermoset materials and the property each is chosen for.", "es": "Reconocer materiales termoestables comunes y la propiedad por la que se elige cada uno."}, "body": [{"p": {"en": "Thermoset molding mixes the resin with a hardener, molds under heat and pressure, cures, cools, and ejects.", "es": "El moldeo termoestable mezcla la resina con un endurecedor, moldea con calor y presión, cura, enfría y expulsa."}}, {"ul": [{"en": "Epoxy — high strength, good chemical and heat resistance, strong adhesion.", "es": "Epoxi — alta resistencia, buena resistencia química y al calor, fuerte adhesión."}, {"en": "Polyurethane — strong and durable, good abrasion and impact resistance.", "es": "Poliuretano — fuerte y duradero, buena resistencia a la abrasión y al impacto."}, {"en": "Silicone — high-temperature resistance, good electrical insulation, flexible at low temperatures.", "es": "Silicona — resistencia a alta temperatura, buena aislación eléctrica, flexible a bajas temperaturas."}, {"en": "Phenolic — high strength, good heat resistance, good resistance to wear.", "es": "Fenólico — alta resistencia, buena resistencia al calor y al desgaste."}]}], "quiz": [{"tag": "check", "stem": {"en": "Which thermoset is chosen for high-temperature resistance and electrical insulation, and stays flexible at low temperatures?", "es": "¿Qué termoestable se elige por su resistencia a alta temperatura y aislación eléctrica, y permanece flexible a bajas temperaturas?"}, "opts": [{"en": "Epoxy", "es": "Epoxi"}, {"en": "Silicone", "es": "Silicona"}, {"en": "Phenolic", "es": "Fenólico"}, {"en": "Polyurethane", "es": "Poliuretano"}], "a": 1, "fb": {"en": "Silicone is the high-temp, good-insulation thermoset that stays flexible when cold.", "es": "La silicona es el termoestable de alta temperatura y buena aislación que sigue flexible en frío."}}, {"tag": "recall", "stem": {"en": "Thermoset parts harden how?", "es": "¿Cómo endurecen las piezas termoestables?"}, "opts": [{"en": "Reversibly — can remelt", "es": "Reversiblemente — pueden refundirse"}, {"en": "Irreversibly — cannot remelt", "es": "Irreversiblemente — no pueden refundirse"}], "a": 1, "fb": {"en": "Recall: thermosets cure irreversibly.", "es": "Repaso: los termoestables curan de forma irreversible."}}]}, {"id": "m1l4", "title": {"en": "Olefins vs. Crystallines", "es": "Olefinas vs. Cristalinos"}, "obj": {"en": "Compare olefins and crystalline thermoplastics and select the right family for a given requirement.", "es": "Comparar olefinas y termoplásticos cristalinos y seleccionar la familia correcta para un requisito dado."}, "body": [{"p": {"en": "Olefins (PP, PE) and crystallines are the two general thermoplastic types. They trade off almost oppositely.", "es": "Las olefinas (PP, PE) y los cristalinos son los dos tipos generales de termoplástico. Se compensan de forma casi opuesta."}}, {"h": {"en": "Olefins", "es": "Olefinas"}}, {"ul": [{"en": "Low price, good chemical resistance, good impact resistance, good dimensional stability, easy to color, good processability.", "es": "Bajo precio, buena resistencia química, buena resistencia al impacto, buena estabilidad dimensional, fácil de colorear, buena procesabilidad."}, {"en": "Poor clarity, poor heat resistance, poor UV resistance, lower strength.", "es": "Poca claridad, poca resistencia al calor, poca resistencia UV, menor resistencia."}]}, {"h": {"en": "Crystallines", "es": "Cristalinos"}}, {"ul": [{"en": "High strength, good clarity, good heat and UV resistance.", "es": "Alta resistencia, buena claridad, buena resistencia al calor y UV."}, {"en": "Poor chemical resistance, poor impact resistance, poor dimensional stability, harder to color.", "es": "Poca resistencia química, poca resistencia al impacto, poca estabilidad dimensional, más difícil de colorear."}]}], "quiz": [{"tag": "check", "stem": {"en": "A customer needs a low-cost, easily colored packaging part where strength is not critical. Best starting family?", "es": "Un cliente necesita una pieza de empaque de bajo costo, fácil de colorear, donde la resistencia no es crítica. ¿Mejor familia inicial?"}, "opts": [{"en": "Crystallines", "es": "Cristalinos"}, {"en": "Olefins (PP/PE)", "es": "Olefinas (PP/PE)"}, {"en": "Thermosets", "es": "Termoestables"}, {"en": "Ceramics", "es": "Cerámicos"}], "a": 1, "fb": {"en": "Olefins are low cost, easy to color, with good impact — ideal when strength is not critical.", "es": "Las olefinas son de bajo costo, fáciles de colorear, con buen impacto — ideales cuando la resistencia no es crítica."}}, {"tag": "check", "stem": {"en": "Which property are crystallines rated POOR on?", "es": "¿En qué propiedad los cristalinos se califican como POBRES?"}, "opts": [{"en": "Heat resistance", "es": "Resistencia al calor"}, {"en": "Clarity", "es": "Claridad"}, {"en": "Chemical resistance", "es": "Resistencia química"}, {"en": "UV resistance", "es": "Resistencia UV"}], "a": 2, "fb": {"en": "Crystallines have good clarity/heat/UV but poor chemical and impact resistance.", "es": "Los cristalinos tienen buena claridad/calor/UV pero poca resistencia química y al impacto."}}, {"tag": "check", "stem": {"en": "Which family generally has better clarity and heat resistance?", "es": "¿Qué familia generalmente tiene mejor claridad y resistencia al calor?"}, "opts": [{"en": "Olefins", "es": "Olefinas"}, {"en": "Crystallines", "es": "Cristalinos"}], "a": 1, "fb": {"en": "Crystallines win on clarity, heat, and UV resistance.", "es": "Los cristalinos ganan en claridad, calor y resistencia UV."}}]}, {"id": "m1l5", "title": {"en": "Common Materials & Their Uses", "es": "Materiales Comunes y Sus Usos"}, "obj": {"en": "Match common named plastics (PE, PP, PC, PS, Acetal, Nylon) to their headline property.", "es": "Asociar plásticos comunes con nombre (PE, PP, PC, PS, Acetal, Nylon) con su propiedad principal."}, "body": [{"h": {"en": "Olefin examples", "es": "Ejemplos de olefinas"}}, {"ul": [{"en": "Polyethylene (PE) & Polypropylene (PP): low cost, good chemical and impact resistance, easy to color.", "es": "Polietileno (PE) y Polipropileno (PP): bajo costo, buena resistencia química y al impacto, fáciles de colorear."}]}, {"h": {"en": "Crystalline examples", "es": "Ejemplos cristalinos"}}, {"ul": [{"en": "Polycarbonate (PC) & Polystyrene (PS): high strength and clarity, good heat/UV, but poor chemical/impact resistance.", "es": "Policarbonato (PC) y Poliestireno (PS): alta resistencia y claridad, buen calor/UV, pero poca resistencia química/impacto."}, {"en": "Acetal: strong and stiff, used in bearings and gears.", "es": "Acetal: fuerte y rígido, usado en cojinetes y engranajes."}, {"en": "Nylon 6/6: good tensile strength (roughly 45–90 MPa).", "es": "Nylon 6/6: buena resistencia a la tracción (aprox. 45–90 MPa)."}]}], "quiz": [{"tag": "check", "stem": {"en": "Which material is commonly chosen for bearings and gears due to strength and stiffness?", "es": "¿Qué material se elige comúnmente para cojinetes y engranajes por su resistencia y rigidez?"}, "opts": [{"en": "Polyethylene", "es": "Polietileno"}, {"en": "Acetal", "es": "Acetal"}, {"en": "Polystyrene", "es": "Poliestireno"}, {"en": "TPU", "es": "TPU"}], "a": 1, "fb": {"en": "Acetal is strong and stiff — a go-to for bearings and gears.", "es": "El acetal es fuerte y rígido — una opción habitual para cojinetes y engranajes."}}, {"tag": "recall", "stem": {"en": "PE and PP belong to which family?", "es": "¿A qué familia pertenecen PE y PP?"}, "opts": [{"en": "Crystallines", "es": "Cristalinos"}, {"en": "Olefins", "es": "Olefinas"}, {"en": "Thermosets", "es": "Termoestables"}], "a": 1, "fb": {"en": "Recall: PE and PP are olefins — low cost, easy to color.", "es": "Repaso: PE y PP son olefinas — bajo costo, fáciles de colorear."}}]}, {"id": "m1l6", "title": {"en": "Flexible Materials & Shore Hardness", "es": "Materiales Flexibles y Dureza Shore"}, "obj": {"en": "Describe TPU/TPE and read the Shore A and Shore B hardness scales correctly.", "es": "Describir TPU/TPE y leer correctamente las escalas de dureza Shore A y Shore B."}, "body": [{"p": {"en": "TPU and TPE are thermoplastics with rubber-like flexibility, durability, and wear resistance. Both can be remelted and reshaped.", "es": "El TPU y el TPE son termoplásticos con flexibilidad tipo caucho, durabilidad y resistencia al desgaste. Ambos pueden refundirse y reformarse."}}, {"h": {"en": "Shore scales", "es": "Escalas Shore"}}, {"ul": [{"en": "Shore A measures softer, flexible materials (rubber, TPU/TPE), from 0 (softest) to 100 (hardest). 70+ is considered hard.", "es": "Shore A mide materiales más blandos y flexibles (caucho, TPU/TPE), de 0 (más blando) a 100 (más duro). 70+ se considera duro."}, {"en": "Shore B (often Shore D in practice) measures more rigid materials, roughly 40 to 95.", "es": "Shore B (a menudo Shore D en la práctica) mide materiales más rígidos, aprox. de 40 a 95."}]}], "tip": {"en": "Most material suppliers will send a free sample kit so you can feel the soft-vs-hard flexibility before deciding.", "es": "La mayoría de los proveedores envían un kit de muestras gratis para que sientas la flexibilidad blando-vs-duro antes de decidir."}, "quiz": [{"tag": "check", "stem": {"en": "On the Shore A scale, a material reading 85 is considered:", "es": "En la escala Shore A, un material que marca 85 se considera:"}, "opts": [{"en": "Soft", "es": "Blando"}, {"en": "Hard", "es": "Duro"}], "a": 1, "fb": {"en": "On Shore A, 70 or higher is considered hard.", "es": "En Shore A, 70 o más se considera duro."}}, {"tag": "check", "stem": {"en": "Which scale is used for soft, flexible materials like rubber and TPU?", "es": "¿Qué escala se usa para materiales blandos y flexibles como caucho y TPU?"}, "opts": [{"en": "Shore A", "es": "Shore A"}, {"en": "Shore B", "es": "Shore B"}], "a": 0, "fb": {"en": "Shore A is for soft/flexible; Shore B is for more rigid materials.", "es": "Shore A es para blando/flexible; Shore B es para materiales más rígidos."}}, {"tag": "recall", "stem": {"en": "Can TPU and TPE be melted and reshaped multiple times?", "es": "¿Se pueden fundir y reformar el TPU y el TPE varias veces?"}, "opts": [{"en": "Yes — they are thermoplastics", "es": "Sí — son termoplásticos"}, {"en": "No — they are thermosets", "es": "No — son termoestables"}], "a": 0, "fb": {"en": "Recall: TPU/TPE are thermoplastics, so they remelt.", "es": "Repaso: TPU/TPE son termoplásticos, así que se refunden."}}]}, {"id": "m1l7", "title": {"en": "Material Shrinkage & Cavity Scaling", "es": "Contracción del Material y Escalado de Cavidad"}, "obj": {"en": "Apply the shrinkage-averaging method to compute the scale factor entered in Fusion360 before splitting a cavity.", "es": "Aplicar el método de promediado de contracción para calcular el factor de escala en Fusion360 antes de dividir una cavidad."}, "body": [{"p": {"en": "Heating expands the molecules; cooling brings them back together, so the part shrinks. You must scale the 3D design up before splitting cavities so the cooled part lands on size.", "es": "El calentamiento expande las moléculas; el enfriamiento las une de nuevo, por lo que la pieza se contrae. Debes escalar el diseño 3D hacia arriba antes de dividir cavidades para que la pieza enfriada quede a medida."}}, {"h": {"en": "The averaging method", "es": "El método de promediado"}}, {"p": {"en": "When a supplier gives a shrinkage range, add the high and low and divide by two. Example: Polyethylene (1.2 + 2.0) / 2 = 1.6%, so you type 1.016 in Fusion360 to scale up.", "es": "Cuando un proveedor da un rango de contracción, suma el alto y el bajo y divide entre dos. Ejemplo: Polietileno (1.2 + 2.0) / 2 = 1.6%, así que escribes 1.016 en Fusion360 para ampliar."}}], "tip": {"en": "The most accurate shrinkage comes from the material supplier; the second best source is the Fusion360 Design module.", "es": "La contracción más precisa viene del proveedor del material; la segunda mejor fuente es el módulo de Diseño de Fusion360."}, "quiz": [{"tag": "check", "stem": {"en": "A part has a published shrinkage range of 1.2–2.0%. What scale factor do you enter in Fusion360?", "es": "Una pieza tiene un rango de contracción publicado de 1.2–2.0%. ¿Qué factor de escala ingresas en Fusion360?"}, "opts": [{"en": "1.020", "es": "1.020"}, {"en": "1.016", "es": "1.016"}, {"en": "1.012", "es": "1.012"}, {"en": "1.032", "es": "1.032"}], "a": 1, "fb": {"en": "Average = (1.2 + 2.0)/2 = 1.6% → 1.016.", "es": "Promedio = (1.2 + 2.0)/2 = 1.6% → 1.016."}}, {"tag": "check", "stem": {"en": "A material's range is 0.6–1.4%. What is the scale factor?", "es": "El rango de un material es 0.6–1.4%. ¿Cuál es el factor de escala?"}, "opts": [{"en": "1.010", "es": "1.010"}, {"en": "1.006", "es": "1.006"}, {"en": "1.014", "es": "1.014"}, {"en": "1.020", "es": "1.020"}], "a": 0, "fb": {"en": "Average = (0.6 + 1.4)/2 = 1.0% → 1.010.", "es": "Promedio = (0.6 + 1.4)/2 = 1.0% → 1.010."}}, {"tag": "check", "stem": {"en": "When must you scale the 3D part for shrinkage?", "es": "¿Cuándo debes escalar la pieza 3D por contracción?"}, "opts": [{"en": "After the mold is built", "es": "Después de construir el molde"}, {"en": "Before cavities are split", "es": "Antes de dividir las cavidades"}, {"en": "During final inspection", "es": "Durante la inspección final"}, {"en": "Never — plastic does not shrink", "es": "Nunca — el plástico no se contrae"}], "a": 1, "fb": {"en": "Scale before splitting cavities so the shrinkage carries through every downstream step.", "es": "Escala antes de dividir cavidades para que la contracción se propague por cada paso posterior."}}]}, {"id": "m1l8", "title": {"en": "Calculating Part Cost", "es": "Cálculo del Costo de la Pieza"}, "obj": {"en": "Identify the inputs to part cost and compute material cost per part from price, weight, and grams-per-pound.", "es": "Identificar las entradas del costo de la pieza y calcular el costo de material por pieza a partir del precio, peso y gramos por libra."}, "body": [{"p": {"en": "Total part cost = material cost + power cost. Material cost per part = (material price per pound) × (part weight in grams ÷ grams per pound). Power cost adds the machine's hourly power over the molding hours.", "es": "Costo total = costo de material + costo de energía. Costo de material por pieza = (precio del material por libra) × (peso de la pieza en gramos ÷ gramos por libra). El costo de energía añade la energía por hora de la máquina durante las horas de moldeo."}}, {"p": {"en": "Worked example from the course: at $0.76/lb and 36 g per part with 453 g per pound, material is about $0.06 per part; power adds roughly $0.0024 per part.", "es": "Ejemplo del curso: a $0.76/lb y 36 g por pieza con 453 g por libra, el material es de unos $0.06 por pieza; la energía añade aprox. $0.0024 por pieza."}}], "quiz": [{"tag": "check", "stem": {"en": "Part cost in this course is made of which two components?", "es": "¿De qué dos componentes se compone el costo de la pieza en este curso?"}, "opts": [{"en": "Material cost + power cost", "es": "Costo de material + costo de energía"}, {"en": "Shipping + tax", "es": "Envío + impuestos"}, {"en": "Labor + marketing", "es": "Mano de obra + marketing"}, {"en": "Tooling + storage", "es": "Herramental + almacenamiento"}], "a": 0, "fb": {"en": "Total = material cost + power cost.", "es": "Total = costo de material + costo de energía."}}, {"tag": "check", "stem": {"en": "Material is $1.00/lb, the part weighs 45 g, and there are 450 g per pound. Material cost per part is about:", "es": "El material cuesta $1.00/lb, la pieza pesa 45 g y hay 450 g por libra. El costo de material por pieza es aprox.:"}, "opts": [{"en": "$0.05", "es": "$0.05"}, {"en": "$0.10", "es": "$0.10"}, {"en": "$0.45", "es": "$0.45"}, {"en": "$1.00", "es": "$1.00"}], "a": 1, "fb": {"en": "45/450 = 0.1 lb × $1.00 = $0.10 per part.", "es": "45/450 = 0.1 lb × $1.00 = $0.10 por pieza."}}]}, {"id": "m1l9", "title": {"en": "Plastic Additives", "es": "Aditivos Plásticos"}, "obj": {"en": "Match common additives to the property they improve.", "es": "Asociar aditivos comunes con la propiedad que mejoran."}, "body": [{"p": {"en": "Additives are blended into a base resin (often at a pelletizer) to improve performance.", "es": "Los aditivos se mezclan en una resina base (a menudo en un peletizador) para mejorar el rendimiento."}}, {"ul": [{"en": "Glass or carbon fibers — add strength, reduce shrinkage, improve dimensional stability.", "es": "Fibras de vidrio o carbono — añaden resistencia, reducen contracción, mejoran estabilidad dimensional."}, {"en": "Talc, mica, clay, calcium carbonate — improve stiffness, reduce shrinkage, improve surface finish.", "es": "Talco, mica, arcilla, carbonato de calcio — mejoran rigidez, reducen contracción, mejoran acabado."}, {"en": "Flame retardants — improve flame resistance and safety.", "es": "Retardantes de llama — mejoran resistencia al fuego y seguridad."}, {"en": "Slip agents / lubricants — improve mold release and surface finish.", "es": "Agentes deslizantes / lubricantes — mejoran la liberación del molde y el acabado."}, {"en": "UV stabilizers / titanium dioxide — improve UV stability and outdoor performance.", "es": "Estabilizadores UV / dióxido de titanio — mejoran la estabilidad UV y el rendimiento exterior."}]}], "quiz": [{"tag": "check", "stem": {"en": "Which additive adds strength AND reduces shrinkage?", "es": "¿Qué aditivo añade resistencia Y reduce la contracción?"}, "opts": [{"en": "Colorants",       fb:L('Everything starts from the environment and the material choice that meets the outcome.','Todo comienza con el entorno y la elecci\u00F3n del material que cumple el objetivo.')},
     {tag:'check',stem:L('When is the part scaled for shrinkage relative to splitting cavities?','\u00BFCu\u00E1ndo se escala la pieza por contracci\u00F3n respecto a la divisi\u00F3n de cavidades?'),
      opts:[L('After the cavities are split','Despu\u00E9s de dividir las cavidades'),L('Before the cavities are split','Antes de dividir las cavidades'),L('After the mold is cut','Despu\u00E9s de mecanizar el molde'),L('It is never scaled','Nunca se escala')],a:1,
      fb:L('Scale for shrinkage BEFORE splitting cavities so it carries through every later step.','Escala por contracci\u00F3n ANTES de dividir cavidades para que se propague a cada paso posterior.')},
     {tag:'recall',stem:L('After the first good parts are produced, what is done for future runs?','Despu\u00E9s de producir las primeras piezas buenas, \u00BFqu\u00E9 se hace para futuras corridas?'),
      opts:[L('The mold is scrapped','Se desecha el molde'),L('The molding process is documented','Se documenta el proceso de moldeo'),L('Shrinkage is re-applied','Se reaplica la contracci\u00F3n'),L('The gate is removed','Se elimina la compuerta')],a:1,
      fb:L('A correct part means the process gets documented so it repeats reliably.','Una pieza correcta significa documentar el proceso para repetirlo de forma confiable.')}
   ]},

  {id:'m2l2',
   title:L('Plastic Molding Processes','Procesos de Moldeo de Pl\u00E1stico'),
   obj:L('Name the major molding processes and match each to the kind of part it makes best.','Nombrar los principales procesos de moldeo y asociar cada uno con el tipo de pieza que mejor produce.'),
   body:[
     {p:L('Injection molding is the focus of this course, but a designer should know the alternatives and their limits at mass scale.','El moldeo por inyecci\u00F3n es el foco de este curso, pero un dise\u00F1ador debe conocer las alternativas y sus l\u00EDmites a gran escala.')},
     {ul:[L('Injection molding \u2014 molten plastic injected into a cavity under high pressure; complex shapes, high volume.','Moldeo por inyecci\u00F3n \u2014 pl\u00E1stico fundido inyectado en una cavidad a alta presi\u00F3n; formas complejas, alto volumen.'),
          L('Blow molding \u2014 air blown into a molten tube to form a hollow part like a bottle.','Moldeo por soplado \u2014 aire soplado en un tubo fundido para formar una pieza hueca como una botella.'),
          L('Thermoforming / pressure forming \u2014 a heated sheet is shaped over a mold or between male/female dies.','Termoformado / formado a presi\u00F3n \u2014 una l\u00E1mina caliente se forma sobre un molde o entre dados macho/hembra.'),
          L('Extrusion \u2014 plastic pushed through a die to make a continuous sheet or profile.','Extrusi\u00F3n \u2014 pl\u00E1stico empujado por un dado para hacer una l\u00E1mina o perfil continuo.'),
          L('Rotational molding \u2014 a mold rotates while heated to form a hollow part.','Moldeo rotacional \u2014 el molde gira mientras se calienta para formar una pieza hueca.'),
          L('Gas assist \u2014 gas injected into the cavity shapes the plastic and reduces material used.','Asistido por gas \u2014 gas inyectado en la cavidad da forma al pl\u00E1stico y reduce el material usado.')]},
     {p:L('This document is about mold-able materials only \u2014 it does NOT cover thin-wall metal stamping or progressive dies.','Este documento trata solo de materiales moldeables \u2014 NO cubre el estampado de metal de pared delgada ni los dados progresivos.')}
   ],
   quiz:[
     {tag:'check',stem:L('Which process injects gas into the cavity to reduce material in thick sections?','\u00BFQu\u00E9 proceso inyecta gas en la cavidad para reducir material en secciones gruesas?'),
      opts:[L('Blow molding','Moldeo por soplado'),L('Gas assist','Asistido por gas'),L('Extrusion','Extrusi\u00F3n'),L('Rotational molding','Moldeo rotacional')],a:1,
      fb:L('Gas assist uses injected gas to shape the plastic and cut material use.','El asistido por gas usa gas inyectado para dar forma y reducir el material.')},
     {tag:'check',stem:L('Which process makes a continuous profile such as pipe or sheet?','\u00BFQu\u00E9 proceso hace un perfil continuo como tubo o l\u00E1mina?'),
      opts:[L('Injection molding','Moldeo por inyecci\u00F3n'),L('Extrusion','Extrusi\u00F3n'),L('Gas assist','Asistido por gas'),L('Blow molding','Moldeo por soplado')],a:1,
      fb:L('Extrusion forces plastic through a die for continuous shapes.','La extrusi\u00F3n fuerza el pl\u00E1stico por un dado para formas continuas.')},
     {tag:'recall',stem:L('Does this course cover progressive metal stamping dies?','\u00BFCubre este curso los dados progresivos de estampado de metal?'),
      opts:[L('Yes','S\u00ED'),L('No \u2014 only mold-able materials','No \u2014 solo materiales moldeables')],a:1,
      fb:L('The scope is mold-able materials, not stamping or progressive dies.','El alcance son materiales moldeables, no estampado ni dados progresivos.')}
   ]},

  {id:'m2l3',
   title:L('Core Mold Features & Functions','Caracter\u00EDsticas y Funciones del Molde'),
   obj:L('Identify the main injection-mold components and state what each one does.','Identificar los componentes principales del molde de inyecci\u00F3n y decir qu\u00E9 hace cada uno.'),
   body:[
     {h:L('Filling the cavity','Llenado de la cavidad')},
     {ul:[L('Gate \u2014 the point where molten plastic enters the cavity. Styles include sprue, edge, tunnel, and valve gates, chosen by part size, material, and appearance.','Compuerta \u2014 el punto donde entra el pl\u00E1stico fundido. Los estilos incluyen colada, lateral, t\u00FAnel y de v\u00E1lvula, elegidos por tama\u00F1o, material y apariencia.'),
          L('Venting \u2014 small channels that let trapped air and gas escape, placed at corners, undercuts, and thick sections.','Venteo \u2014 peque\u00F1os canales que dejan escapar aire y gases atrapados, ubicados en esquinas, socavados y secciones gruesas.'),
          L('Cooling \u2014 drilled water lines pull heat from the mold; gas-charged thermal pins reach spots water cannot.','Enfriamiento \u2014 l\u00EDneas de agua perforadas extraen el calor; pasadores t\u00E9rmicos con gas llegan donde el agua no puede.')]},
     {h:L('Aligning and supporting the mold','Alinear y soportar el molde')},
     {ul:[L('Leader pins & bushings \u2014 hardened ground pins ride in graphite-bearing bushings; the pin is slightly under-size and the bushing slightly over-size so they do not seize when hot.','Pasadores gu\u00EDa y bujes \u2014 pasadores rectificados endurecidos corren en bujes con grafito; el pasador es algo menor y el buje algo mayor para no agarrotarse en caliente.'),
          L('Parting-line taper locks \u2014 hardened ground blocks that align A and B sides beyond the leader pins; machined at assembly for optimal alignment.','Cierres c\u00F3nicos de l\u00EDnea de partici\u00F3n \u2014 bloques rectificados endurecidos que alinean los lados A y B m\u00E1s all\u00E1 de los pasadores gu\u00EDa; mecanizados en ensamble.'),
          L('Support pillars \u2014 carry the injection load so the B-side does not bend; screwed into the back of the B-side.','Pilares de soporte \u2014 soportan la carga de inyecci\u00F3n para que el lado B no se doble; atornillados al respaldo del lado B.'),
          L('Thermal (insulator) plates \u2014 thin phenolic plates that keep the platen from pulling heat out of the hot side.','Placas t\u00E9rmicas (aislantes) \u2014 placas finas de fen\u00F3lico que evitan que la platina extraiga el calor del lado caliente.')]}
   ],
   quiz:[
     {tag:'check',stem:L('What is the function of venting in a mold?','\u00BFCu\u00E1l es la funci\u00F3n del venteo en un molde?'),
      opts:[L('To cool the plastic','Enfriar el pl\u00E1stico'),L('To let trapped air and gas escape','Dejar escapar aire y gases atrapados'),L('To eject the part','Expulsar la pieza'),L('To align the mold halves','Alinear las mitades del molde')],a:1,
      fb:L('Vents prevent air entrapment and improve flow, especially at corners and thick sections.','Los venteos evitan el atrapamiento de aire y mejoran el flujo, sobre todo en esquinas y secciones gruesas.')},
     {tag:'check',stem:L('Why are leader pins made slightly smaller and bushings slightly bigger?','\u00BFPor qu\u00E9 los pasadores gu\u00EDa se hacen algo menores y los bujes algo mayores?'),
      opts:[L('To save steel','Para ahorrar acero'),L('To prevent seizing when the tool gets hot','Para evitar agarrotamiento cuando la herramienta se calienta'),L('To add tonnage','Para a\u00F1adir tonelaje'),L('To improve gloss','Para mejorar el brillo')],a:1,
      fb:L('The tolerance stack-up keeps them from seizing as heat expands the parts.','El apilamiento de tolerancias evita el agarrotamiento cuando el calor expande las piezas.')},
     {tag:'check',stem:L('What do support pillars prevent?','\u00BF Qu\u00E9 evitan los pilares de soporte?'),
      opts:[L('Short shots','Disparos cortos'),L('The B-side bending under injection pressure','Que el lado B se doble bajo la presi\u00F3n de inyecci\u00F3n'),L('Flash','Rebaba'),L('Warping of the part','Alabeo de la pieza')],a:1,
      fb:L('Support pillars carry the injection load so the B-side plate will not bend.','Los pilares soportan la carga de inyecci\u00F3n para que el lado B no se doble.')}
   ]},

  {id:'m2l4',
   title:L('Ejection Systems','Sistemas de Expulsi\u00F3n'),
   obj:L('Explain how the ejector train removes a part and returns to home position.','Explicar c\u00F3mo el tren expulsor retira una pieza y vuelve a la posici\u00F3n inicial.'),
   body:[
     {p:L('Ejection removes the molded part after the mold opens. Methods include ejector pins, ejector sleeves, return pins, and ejector blades, chosen by part size, material, and mold complexity.','La expulsi\u00F3n retira la pieza moldeada tras abrir el molde. Los m\u00E9todos incluyen pasadores, camisas, pasadores de retorno y cuchillas expulsoras, elegidos por tama\u00F1o, material y complejidad.')},
     {ul:[L('Ejector pins & sleeves \u2014 pins push the part out; a sleeve slips over a core pin to strip a part off at ejection.','Pasadores y camisas \u2014 los pasadores empujan la pieza; una camisa se desliza sobre un n\u00FAcleo para desprender la pieza.'),
          L('Return pins & springs \u2014 push the ejector plates back home; springs are pre-loaded ~5 mm and the return pin sits level with the parting line.','Pasadores y resortes de retorno \u2014 empujan las placas expulsoras a su lugar; los resortes se precargan ~5 mm y el pasador queda a nivel de la l\u00EDnea de partici\u00F3n.'),
          L('Hard stops \u2014 screwed to the back of the B-side; they stop ejector travel before the springs fully compress.','Topes duros \u2014 atornillados al respaldo del lado B; detienen el recorrido antes de comprimir del todo los resortes.'),
          L('Knockout bars \u2014 connect to the machine ejector box; when the mold opens the machine strikes them forward to push the ejector plates until the hard stop is hit.','Barras de expulsi\u00F3n \u2014 conectan a la caja expulsora de la m\u00E1quina; al abrir el molde, la m\u00E1quina las empuja para mover las placas hasta el tope duro.')]}
   ],
   tip:L('Drill the ejector-pin hole about 0.0005" larger on each surface than the pin so it does not seize when the mold heats up.','Perfora el agujero del pasador expulsor unos 0.0005" m\u00E1s grande por cara que el pasador para que no se agarrote al calentarse el molde.'),
   quiz:[
     {tag:'check',stem:L('What is the job of return pins and springs?','\u00BFCu\u00E1l es la funci\u00F3n de los pasadores y resortes de retorno?'),
      opts:[L('Inject plastic','Inyectar pl\u00E1stico'),L('Push the ejector plates back to home position','Empujar las placas expulsoras a su posici\u00F3n inicial'),L('Cool the cavity','Enfriar la cavidad'),L('Lock the parting line','Bloquear la l\u00EDnea de partici\u00F3n')],a:1,
      fb:L('Return pins and pre-loaded springs return the ejector plates when the mold closes.','Los pasadores de retorno y los resortes precargados regresan las placas al cerrar el molde.')},
     {tag:'check',stem:L('What strikes the ejector plates forward, and what stops them?','\u00BFQu\u00E9 empuja las placas expulsoras y qu\u00E9 las detiene?'),
      opts:[L('Knockout bars push; hard stops stop them','Las barras empujan; los topes duros las detienen'),L('Leader pins push; springs stop them','Los pasadores gu\u00EDa empujan; los resortes las detienen'),L('The gate pushes; the vent stops it','La compuerta empuja; el venteo la detiene'),L('Coolant pushes; the platen stops it','El refrigerante empuja; la platina la detiene')],a:0,
      fb:L('Machine knockout bars push the plates; hard stops limit the travel.','Las barras de la m\u00E1quina empujan las placas; los topes duros limitan el recorrido.')},
     {tag:'check',stem:L('An ejector sleeve is used to:','Una camisa expulsora se usa para:'),
      opts:[L('Vent gas','Ventear gas'),L('Strip a part off a core pin','Desprender una pieza de un n\u00FAcleo'),L('Align the mold','Alinear el molde'),L('Add cooling','A\u00F1adir enfriamiento')],a:1,
      fb:L('A sleeve slips over the core pin and strips the part at ejection.','La camisa se desliza sobre el n\u00FAcleo y desprende la pieza al expulsar.')}
   ]},

  {id:'m2l5',
   title:L('Cavity & Core Splitting in Fusion360','Divisi\u00F3n de Cavidad y N\u00FAcleo en Fusion360'),
   obj:L('Follow the Fusion360 boundary-fill workflow to split a cavity and core from a block.','Seguir el flujo de relleno de l\u00EDmites de Fusion360 para dividir cavidad y n\u00FAcleo de un bloque.'),
   body:[
     {p:L('Splitting cavities and cores from a block is one of the hardest CAD tasks. Doing it outside the mold base keeps it simple, then you combine the result into the A and B plates.','Dividir cavidades y n\u00FAcleos de un bloque es una de las tareas CAD m\u00E1s dif\u00EDciles. Hacerlo fuera de la base del molde lo simplifica; luego combinas el resultado en las placas A y B.')},
     {h:L('The steps','Los pasos')},
     {ul:[L('Add shrinkage to the part, then design the cavities and runners and use Combine.','A\u00F1ade contracci\u00F3n a la pieza, dise\u00F1a cavidades y canales y usa Combinar.'),
          L('Cap off every hole that defines where the mold breaks apart.','Tapa cada agujero que define d\u00F3nde se separa el molde.'),
          L('Extend a rectangular block around the part(s), then subtract the parts from the block with Combine.','Extiende un bloque rectangular alrededor de la(s) pieza(s) y resta las piezas del bloque con Combinar.'),
          L('Build a parting line that extends past the block.','Construye una l\u00EDnea de partici\u00F3n que se extienda m\u00E1s all\u00E1 del bloque.'),
          L('Use Boundary Fill on the block and surfaces to select one body, then repeat on the other side.','Usa Relleno de L\u00EDmites en el bloque y las superficies para seleccionar un cuerpo, luego repite en el otro lado.')]},
     {p:L('A family mold gangs up multiple cavities of similar parts in the counts needed for an assembly or sub-assembly.','Un molde familiar agrupa varias cavidades de piezas similares en las cantidades necesarias para un ensamble o subensamble.')}
   ],
   tip:L('Make cavities and cores outside the mold base; then cut a pocket in the A & B plates and use Combine to make them one piece.','Haz cavidades y n\u00FAcleos fuera de la base del molde; luego corta una cajera en las placas A y B y usa Combinar para unirlos.'),
   quiz:[
     {tag:'check',stem:L('Which Fusion360 command finally creates the cavity/core solid from the block and surfaces?','\u00BFQu\u00E9 comando de Fusion360 crea finalmente el s\u00F3lido de cavidad/n\u00FAcleo a partir del bloque y las superficies?'),
      opts:[L('Extrude','Extruir'),L('Boundary Fill','Relleno de L\u00EDmites'),L('Revolve','Revolucionar'),L('Sweep','Barrer')],a:1,
      fb:L('Boundary Fill selects the block and surfaces to build each half.','Relleno de L\u00EDmites selecciona el bloque y las superficies para construir cada mitad.')},
     {tag:'check',stem:L('Before subtracting the part from the block, what must you do to the holes?','Antes de restar la pieza del bloque, \u00BFqu\u00E9 debes hacer con los agujeros?'),
      opts:[L('Enlarge them','Agrandarlos'),L('Cap off the holes that define the split','Tapar los agujeros que definen la divisi\u00F3n'),L('Thread them','Roscarlos'),L('Ignore them','Ignorarlos')],a:1,
      fb:L('Cap the holes that define where the mold breaks apart so the split is clean.','Tapa los agujeros que definen la separaci\u00F3n para una divisi\u00F3n limpia.')},
     {tag:'recall',stem:L('A family mold is used to:','Un molde familiar se usa para:'),
      opts:[L('Mold one giant part','Moldear una pieza gigante'),L('Gang up similar parts in assembly counts','Agrupar piezas similares en cantidades de ensamble'),L('Avoid shrinkage','Evitar la contracci\u00F3n'),L('Replace the runner','Reemplazar el canal')],a:1,
      fb:L('Family molds combine similar parts in the quantities an assembly needs.','Los moldes familiares combinan piezas similares en las cantidades que requiere un ensamble.')}
   ]},

  {id:'m2l6',
   title:L('Undercuts: Slides & Lifters','Socavados: Correderas y Elevadores'),
   obj:L('Describe how slides and lifters release undercuts and why they add cost.','Describir c\u00F3mo las correderas y elevadores liberan socavados y por qu\u00E9 a\u00F1aden costo.'),
   body:[
     {p:L('An undercut is a feature that prevents the part from ejecting straight out. Slides and lifters create a path so the undercut can clear as the part ejects.','Un socavado es una caracter\u00EDstica que impide expulsar la pieza en l\u00EDnea recta. Las correderas y elevadores crean un camino para que el socavado libere al expulsar.')},
     {ul:[L('Slides/lifters sit on the moving side and travel in and out as needed; gibs trap the slide so it moves in a controlled direction away from the undercut.','Las correderas/elevadores van en el lado m\u00F3vil y entran y salen seg\u00FAn se necesite; las gu\u00EDas (gibs) atrapan la corredera para que se mueva controladamente lejos del socavado.'),
          L('Cam pins extend out to pull the slide away from the part as the mold opens.','Los pasadores leva se extienden para alejar la corredera de la pieza al abrir el molde.'),
          L('Slides need cooling too, and may be driven by hydraulic or pneumatic cylinders tied to the machine\u2019s process logic.','Las correderas tambi\u00E9n necesitan enfriamiento y pueden moverse con cilindros hidr\u00E1ulicos o neum\u00E1ticos ligados a la l\u00F3gica de la m\u00E1quina.')]}
   ],
   tip:L('It is always better to design parts WITHOUT slides or lifters \u2014 they add significant mold cost, build time, and ongoing maintenance because they are moving parts.','Siempre es mejor dise\u00F1ar piezas SIN correderas ni elevadores \u2014 a\u00F1aden costo, tiempo de construcci\u00F3n y mantenimiento por ser partes m\u00F3viles.'),
   quiz:[
     {tag:'check',stem:L('What is the primary purpose of a slide or lifter?','\u00BFCu\u00E1l es el prop\u00F3sito principal de una corredera o elevador?'),
      opts:[L('Cool the mold','Enfriar el molde'),L('Release an undercut','Liberar un socavado'),L('Add tonnage','A\u00F1adir tonelaje'),L('Vent gas','Ventear gas')],a:1,
      fb:L('Slides and lifters create the path that lets an undercut clear during ejection.','Las correderas y elevadores crean el camino que deja liberar un socavado al expulsar.')},
     {tag:'check',stem:L('What pulls the slide away from the part as the mold opens?','\u00BFQu\u00E9 aleja la corredera de la pieza al abrir el molde?'),
      opts:[L('Return pins','Pasadores de retorno'),L('Cam pins','Pasadores leva'),L('Support pillars','Pilares de soporte'),L('Knockout bars','Barras de expulsi\u00F3n')],a:1,
      fb:L('Cam pins extend to drive the slide outward as the mold opens.','Los pasadores leva se extienden para mover la corredera hacia afuera al abrir.')},
     {tag:'check',stem:L('Why avoid slides and lifters when possible?','\u00BFPor qu\u00E9 evitar correderas y elevadores cuando sea posible?'),
      opts:[L('They make parts heavier','Hacen las piezas m\u00E1s pesadas'),L('They add cost, build time, and maintenance','A\u00F1aden costo, tiempo y mantenimiento'),L('They block cooling','Bloquean el enfriamiento'),L('They reduce strength','Reducen la resistencia')],a:1,
      fb:L('As moving parts they raise mold cost, lengthen the build, and need maintenance.','Como partes m\u00F3viles elevan el costo, alargan la construcci\u00F3n y requieren mantenimiento.')}
   ]},

  {id:'m2l7',
   title:L('Unscrewing Mechanisms','Mecanismos de Desenrosque'),
   obj:L('Explain how an unscrewing mechanism releases a threaded (undercut) feature.','Explicar c\u00F3mo un mecanismo de desenrosque libera una caracter\u00EDstica roscada (socavado).'),
   body:[
     {p:L('Threads are an undercut. An unscrewing mechanism rotates and moves a hardened screw axially during the molding cycle to release a threaded part from the mold.','Las roscas son un socavado. Un mecanismo de desenrosque gira y mueve axialmente un tornillo endurecido durante el ciclo para liberar una pieza roscada del molde.')},
     {p:L('It is built into the mold design and is common on plastic parts with threads, such as electrical connectors, caps, and automotive parts.','Se integra en el dise\u00F1o del molde y es com\u00FAn en piezas pl\u00E1sticas con roscas, como conectores el\u00E9ctricos, tapas y piezas automotrices.')}
   ],
   quiz:[
     {tag:'check',stem:L('A molded internal thread is an example of what?','Una rosca interna moldeada es un ejemplo de qu\u00E9?'),
      opts:[L('A vent','Un venteo'),L('An undercut','Un socavado'),L('A gate','Una compuerta'),L('A parting line','Una l\u00EDnea de partici\u00F3n')],a:1,
      fb:L('Threads are undercuts, which is why an unscrewing mechanism is needed.','Las roscas son socavados, por eso se necesita un mecanismo de desenrosque.')},
     {tag:'check',stem:L('How does an unscrewing mechanism release a threaded part?','\u00BFC\u00F3mo libera un mecanismo de desenrosque una pieza roscada?'),
      opts:[L('It melts the threads','Funde las roscas'),L('It rotates and moves the screw axially','Gira y mueve el tornillo axialmente'),L('It blows air into the cavity','Sopla aire en la cavidad'),L('It cools the gate','Enfr\u00EDa la compuerta')],a:1,
      fb:L('Rotation plus axial motion backs the thread out of the molded part.','La rotaci\u00F3n m\u00E1s el movimiento axial saca la rosca de la pieza moldeada.')}
   ]},

  {id:'m2l8',
   title:L('Hot Runners & Valve Gates','Canales Calientes y Compuertas de V\u00E1lvula'),
   obj:L('Compare hot-tip and valve-gate hot runners and weigh their cost and lead-time impact.','Comparar canales calientes de punta y de v\u00E1lvula y sopesar su impacto en costo y plazo.'),
   body:[
     {p:L('Hot runners push material from the center out on complex shapes and can feed multiple cavities. They come in two styles.','Los canales calientes empujan material del centro hacia afuera en formas complejas y pueden alimentar varias cavidades. Vienen en dos estilos.')},
     {ul:[L('Hot tip \u2014 delivers through a small hole; leaves a small dimple but is dependable, lower cost, and lower maintenance.','Punta caliente \u2014 entrega por un agujero peque\u00F1o; deja un peque\u00F1o hoyuelo pero es confiable, m\u00E1s barata y de bajo mantenimiento.'),
          L('Valve gate \u2014 delivers through a plunger-and-bushing that can be textured; needs more controls, is finicky to run, and costs about double a hot tip.','Compuerta de v\u00E1lvula \u2014 entrega por \u00E9mbolo y buje texturizable; requiere m\u00E1s controles, es delicada y cuesta cerca del doble que una punta.')]},
     {p:L('Each drop must change temperature, monitored at the machine controller in a feedback loop. Expect a hot-runner system to roughly TRIPLE both the mold cost and the lead time.','Cada boquilla debe cambiar de temperatura, monitoreada en el controlador en un lazo de realimentaci\u00F3n. Un sistema de canal caliente suele TRIPLICAR el costo del molde y el plazo.')}
   ],
   tip:L('If the part is small enough, buy off-the-shelf hot tips and valve gates in stock sizes \u2014 you still need a thermal controller to monitor and throttle heat at each drop.','Si la pieza es peque\u00F1a, compra puntas y compuertas est\u00E1ndar \u2014 a\u00FAn necesitas un controlador t\u00E9rmico para monitorear y regular el calor en cada boquilla.'),
   quiz:[
     {tag:'check',stem:L('Which hot-runner style is cheaper and lower-maintenance but leaves a small dimple?','\u00BFQu\u00E9 estilo de canal caliente es m\u00E1s barato y de bajo mantenimiento pero deja un hoyuelo?'),

  {id:'m2l9',

     {h:L('Texturing methods','M\u00E9todos de texturizado')},
     {ul:[L('Etching, laser texturing, electrolytic texturing, electroplating, chemical milling, and stamping all add a controlled surface texture.','Grabado, texturizado l\u00E1ser, texturizado electrol\u00EDtico, electrodeposici\u00F3n, fresado qu\u00EDmico y estampado a\u00F1aden una textura controlada.')]},

  {id:'m2l10',
   title:L('Cavity Materials: Aluminum vs. P20','Materiales de Cavidad: Aluminio vs. P20'),
   obj:L('Trade off aircraft aluminum and P20 steel for cavities using thermal conductivity and durability.','Comparar aluminio aeron\u00E1utico y acero P20 para cavidades usando conductividad t\u00E9rmica y durabilidad.'),
   body:[
     {p:L('Thermal conductivity (W/m\u00B7K) measures how well a material moves heat. Higher conductivity means faster cooling and faster cycle times.','La conductividad t\u00E9rmica (W/m\u00B7K) mide qu\u00E9 tan bien un material conduce el calor. Mayor conductividad significa enfriamiento y ciclos m\u00E1s r\u00E1pidos.')},
     {ul:[L('7071 aircraft aluminum (~169 W/m\u00B7K) \u2014 about 3.5\u00D7 more conductive than steel, faster cycles, soft and easy to cut; but cavities wear out faster.','Aluminio aeron\u00E1utico 7071 (~169 W/m\u00B7K) \u2014 unas 3.5\u00D7 m\u00E1s conductivo que el acero, ciclos m\u00E1s r\u00E1pidos, blando y f\u00E1cil de cortar; pero las cavidades se desgastan antes.'),
          L('P20 mold steel (~45 W/m\u00B7K) \u2014 hard, holds up under high volumes; but longer cycles, longer to cut, and may need EDM to burn features that cannot be cut.','Acero de molde P20 (~45 W/m\u00B7K) \u2014 duro, resiste altos vol\u00FAmenes; pero ciclos m\u00E1s largos, m\u00E1s tiempo de corte y puede requerir EDM para quemar caracter\u00EDsticas no cortables.')]}
   ],
   quiz:[
     {tag:'check',stem:L('Why does aluminum give faster cycle times than P20 steel?','\u00BFPor qu\u00E9 el aluminio da ciclos m\u00E1s r\u00E1pidos que el acero P20?'),
      opts:[L('It is harder','Es m\u00E1s duro'),L('It has much higher thermal conductivity','Tiene mucha mayor conductividad t\u00E9rmica'),L('It is heavier','Es m\u00E1s pesado'),L('It needs EDM','Necesita EDM')],a:1,
      fb:L('Aluminum is ~3.5\u00D7 more thermally conductive, so it cools the part faster.','El aluminio es ~3.5\u00D7 m\u00E1s conductivo, as\u00ED que enfr\u00EDa la pieza m\u00E1s r\u00E1pido.')},
     {tag:'check',stem:L('What is the main downside of an aluminum cavity?','\u00BFCu\u00E1l es la principal desventaja de una cavidad de aluminio?'),
      opts:[L('It cannot be cut','No se puede cortar'),L('It wears out faster than steel','Se desgasta m\u00E1s r\u00E1pido que el acero'),L('It cools too slowly','Se enfr\u00EDa muy lento'),L('It cannot be polished','No se puede pulir')],a:1,
      fb:L('Aluminum is soft, so cavities wear out over a shorter life than steel.','El aluminio es blando, as\u00ED que las cavidades duran menos que las de acero.')},
     {tag:'recall',stem:L('Which material may require EDM to burn features that cannot be cut?','\u00BFQu\u00E9 material puede requerir EDM para quemar caracter\u00EDsticas no cortables?'),
      opts:[L('Aluminum','Aluminio'),L('P20 steel','Acero P20')],a:1,
      fb:L('Hard P20 steel often needs EDM for features that cannot be milled.','El acero P20 duro suele requerir EDM para caracter\u00EDsticas que no se pueden fresar.')}
   ]},

  {id:'m2l11',
   title:L('Tonnage & Venting','Tonelaje y Venteo'),
   obj:L('Estimate required press tonnage from parting-line area and explain why venting matters.','Estimar el tonelaje de prensa requerido a partir del \u00E1rea de l\u00EDnea de partici\u00F3n y explicar la importancia del venteo.'),
   body:[
     {p:L('Press tonnage is the clamping force that keeps the mold closed against injection pressure. Estimate it from the total projected area at the parting line times a material factor.','El tonelaje de prensa es la fuerza de cierre que mantiene el molde cerrado contra la presi\u00F3n de inyecci\u00F3n. Se estima del \u00E1rea proyectada total en la l\u00EDnea de partici\u00F3n por un factor del material.')},
     {ul:[L('Easy-to-flow materials need about 2\u00D7 the parting-line area.','Los materiales f\u00E1ciles de fluir necesitan unas 2\u00D7 el \u00E1rea de la l\u00EDnea de partici\u00F3n.'),
          L('Hard-to-process materials like Nylon call for about 3\u201340\u00D7 \u2014 use 3\u20134\u00D7 for tough resins.','Los materiales dif\u00EDciles como el Nylon piden ~3\u20134\u00D7 \u2014 usa 3\u20134\u00D7 para resinas duras.')]},
     {p:L('The mold halves are held closed by the press hydraulic clamp; the injection force pushing material in needs a vent to release the air it displaces, or you get short shots and burns.','Las mitades del molde se cierran con la pinza hidr\u00E1ulica; la fuerza de inyecci\u00F3n necesita un venteo para liberar el aire que desplaza, o aparecen disparos cortos y quemaduras.')}
   ],
   quiz:[
     {tag:'check',stem:L('Tonnage is estimated from which area, times a material factor?','El tonelaje se estima de qu\u00E9 \u00E1rea, por un factor del material?'),
      opts:[L('The gate area','El \u00E1rea de la compuerta'),L('The total projected area at the parting line','El \u00E1rea proyectada total en la l\u00EDnea de partici\u00F3n'),L('The runner volume','El volumen del canal'),L('The ejector-pin area','El \u00E1rea de los pasadores')],a:1,
      fb:L('Use the projected parting-line area times the material factor (2\u20134\u00D7).','Usa el \u00E1rea proyectada de la l\u00EDnea de partici\u00F3n por el factor del material (2\u20134\u00D7).')},
     {tag:'check',stem:L('Which needs the higher tonnage factor?','\u00BFCu\u00E1l necesita el factor de tonelaje m\u00E1s alto?'),
      opts:[L('An easy-flow material (~2\u00D7)','Un material de flujo f\u00E1cil (~2\u00D7)'),L('A hard-to-process material like Nylon (3\u20134\u00D7)','Un material dif\u00EDcil como el Nylon (3\u20134\u00D7)')],a:1,
      fb:L('Hard-to-process resins like Nylon need roughly 3\u20134\u00D7 the parting-line area.','Las resinas dif\u00EDciles como el Nylon necesitan ~3\u20134\u00D7 el \u00E1rea de la l\u00EDnea de partici\u00F3n.')},
     {tag:'check',stem:L('What happens without adequate venting?','\u00BFQu\u00E9 pasa sin un venteo adecuado?'),
      opts:[L('Faster cooling','Enfriamiento m\u00E1s r\u00E1pido'),L('Trapped air causes short shots and burns','El aire atrapado causa disparos cortos y quemaduras'),L('Lower tonnage needed','Se requiere menos tonelaje'),L('Better gloss','Mejor brillo')],a:1,
      fb:L('Displaced air must escape; without vents you get short shots and burn marks.','El aire desplazado debe escapar; sin venteos hay disparos cortos y quemaduras.')}
   ]},

  {id:'m2l12',
   title:L('Tolerances & Fusion360 Mold Tools','Tolerancias y Herramientas de Molde de Fusion360'),
   obj:L('State the working tolerance targets and identify the Fusion360 tools used in mold design.','Indicar los objetivos de tolerancia de trabajo e identificar las herramientas de molde de Fusion360.'),
   body:[
     {p:L('Cavity and parting-line tolerances are generally about \u00B10.0002" (0.005 mm). Leave ~0.1 mm of stock and slow the finish cut to hit shut-off features; step the final pass over at ~0.001" (0.025 mm) for a faster hand polish.','Las tolerancias de cavidad y l\u00EDnea de partici\u00F3n son ~\u00B10.0002" (0.005 mm). Deja ~0.1 mm de material y reduce el corte de acabado para lograr cierres; avanza el paso final ~0.001" (0.025 mm) para un pulido manual m\u00E1s r\u00E1pido.')},
     {p:L('Working pins (ejector pins and sleeves) get a high/low tolerance so they do not seize when heat expands the mold. Drill the hole about 0.0005" larger per surface than the pin.','Los pasadores de trabajo (expulsores y camisas) llevan una tolerancia alta/baja para no agarrotarse cuando el calor expande el molde. Perfora el agujero ~0.0005" m\u00E1s grande por cara que el pasador.')},
     {h:L('Fusion360 mold tools','Herramientas de molde de Fusion360')},
     {ul:[L('Parting Lines, Draft Analysis, and Core & Cavity Split for separating the halves.','L\u00EDneas de Partici\u00F3n, An\u00E1lisis de Desmoldeo y Divisi\u00F3n de N\u00FAcleo y Cavidad para separar las mitades.'),
          L('Shutoffs & Gates, Ejector Pins, Slides & Lifters, and Cooling Channels for mold detail.','Cierres y Compuertas, Pasadores Expulsores, Correderas y Elevadores, y Canales de Enfriamiento para el detalle.'),
          L('Simulation (mold fill, draft) to verify the part ejects and to optimize cycle time before cutting steel.','Simulaci\u00F3n (llenado, desmoldeo) para verificar la expulsi\u00F3n y optimizar el ciclo antes de cortar acero.')]}
   ],
   tip:L('Slow the final finish pass (lower feed, higher tool speed). It can run for days on a complex cavity, but it is what holds the tolerance and cuts hand-polishing time.','Reduce el pase de acabado final (menor avance, mayor velocidad de herramienta). Puede tardar d\u00EDas en una cavidad compleja, pero es lo que mantiene la tolerancia y reduce el pulido manual.'),
   quiz:[
     {tag:'check',stem:L('What is the general cavity / parting-line tolerance target?','\u00BFCu\u00E1l es el objetivo general de tolerancia de cavidad / l\u00EDnea de partici\u00F3n?'),
      opts:[L('\u00B10.010" (0.25 mm)','\u00B10.010" (0.25 mm)'),L('\u00B10.0002" (0.005 mm)','\u00B10.0002" (0.005 mm)'),L('\u00B10.05" (1.27 mm)','\u00B10.05" (1.27 mm)'),L('\u00B10.002" (0.05 mm)','\u00B10.002" (0.05 mm)')],a:1,
      fb:L('Aim for about \u00B10.0002" (0.005 mm) on cavities and parting lines.','Apunta a ~\u00B10.0002" (0.005 mm) en cavidades y l\u00EDneas de partici\u00F3n.')},
     {tag:'check',stem:L('How much larger should an ejector-pin hole be than the pin, per surface?','\u00BFCu\u00E1nto m\u00E1s grande debe ser el agujero del pasador que el pasador, por cara?'),
      opts:[L('About 0.0005"','Aprox. 0.0005"'),L('About 0.05"','Aprox. 0.05"'),L('Exactly equal','Exactamente igual'),L('About 0.010"','Aprox. 0.010"')],a:0,
      fb:L('~0.0005" per surface keeps the pin from seizing as the mold heats.','~0.0005" por cara evita que el pasador se agarrote al calentarse el molde.')},
     {tag:'check',stem:L('Which Fusion360 tool checks whether a part can eject from the cavity?','\u00BFQu\u00E9 herramienta de Fusion360 verifica si una pieza puede expulsarse de la cavidad?'),

      fb:L('Draft Analysis confirms enough draft so the part releases from the cavity.','El An\u00E1lisis de Desmoldeo confirma suficiente \u00E1ngulo para que la pieza libere.')}

          L('Bed \u2014 the cast-iron or steel base that gives a stable platform, often with slides/ways for precise motion.','Bancada \u2014 la base de hierro fundido o acero que da una plataforma estable, a menudo con gu\u00EDas para movimiento preciso.'),

          L('Coolant \u2014 water or oil that cools and lubricates the tool, extends tool life, and improves finish.','Refrigerante \u2014 agua o aceite que enfr\u00EDa y lubrica la herramienta, alarga su vida y mejora el acabado.'),
          L('Tool changer & tool holder \u2014 automatically swaps cutters; the holder grips the tool in the spindle.','Cambiador y portaherramientas \u2014 intercambia cortadores autom\u00E1ticamente; el portaherramientas sujeta la herramienta en el husillo.'),
          L('Tool offsets \u2014 distances between the tool and the reference point that compensate for tool/workpiece variation.','Compensaciones de herramienta \u2014 distancias entre la herramienta y el punto de referencia que compensan la variaci\u00F3n.'),
          L('Chip removal \u2014 manual or a chip conveyor that clears the chips produced during machining.','Remoci\u00F3n de viruta \u2014 manual o un transportador que retira la viruta producida al mecanizar.')]}
   ],
   quiz:[
     {tag:'check',stem:L('Which component is the "brain" that interprets the program?','\u00BFQu\u00E9 componente es el "cerebro" que interpreta el programa?'),
      opts:[L('The bed','La bancada'),L('The controller','El controlador'),L('The vice','La prensa'),L('The coolant','El refrigerante')],a:1,
      fb:L('The controller interprets the machining program and controls the movements.','El controlador interpreta el programa y controla los movimientos.')},
     {tag:'check',stem:L('What is the purpose of coolant during machining?','\u00BFCu\u00E1l es el prop\u00F3sito del refrigerante al mecanizar?'),
      opts:[L('To add tonnage','A\u00F1adir tonelaje'),L('To cool and lubricate the tool and improve finish','Enfriar y lubricar la herramienta y mejorar el acabado'),L('To hold the workpiece','Sujetar la pieza'),L('To change tools','Cambiar herramientas')],a:1,
      fb:L('Coolant cools and lubricates the cutter, prolonging tool life and improving finish.','El refrigerante enfr\u00EDa y lubrica el cortador, alarga su vida y mejora el acabado.')},
     {tag:'check',stem:L('Tool offsets are used to:','Las compensaciones de herramienta sirven para:'),
      opts:[L('Compensate for tool/workpiece variation','Compensar la variaci\u00F3n de herramienta/pieza'),L('Cool the spindle','Enfriar el husillo'),L('Remove chips','Retirar viruta'),L('Bend sheet metal','Doblar chapa')],a:0,
      fb:L('Offsets are the tool-to-reference distances that keep parts to spec despite variation.','Las compensaciones son las distancias herramienta-referencia que mantienen la pieza a medida.')}
   ]},

  {id:'m3l4',
   title:L('CNC Mill Cutters','Cortadores de Fresadora CNC'),
   obj:L('Select the right cutter for a given mold-machining task.','Seleccionar el cortador correcto para una tarea de mecanizado de molde.'),
   body:[
     {ul:[L('Flat end mill \u2014 flat tip; cuts flat surfaces and slots.','Fresa de punta plana \u2014 punta plana; corta superficies planas y ranuras.'),
          L('Ball end mill \u2014 rounded tip; cuts curved surfaces and contours (key for sculpted cavities).','Fresa de punta esf\u00E9rica \u2014 punta redondeada; corta superficies curvas y contornos (clave para cavidades esculpidas).'),
          L('Shell mill \u2014 large multi-tooth cutter that removes a lot of material fast for roughing big parts.','Fresa de planear \u2014 cortador grande multidiente que remueve mucho material r\u00E1pido para desbastar piezas grandes.'),
          L('Keyway cutter \u2014 cuts keyways/slots for a precise fit between mating parts (shaft and hub).','Cortador de chavetero \u2014 corta chaveteros/ranuras para un ajuste preciso entre piezas (eje y cubo).'),
          L('Reamer \u2014 enlarges/finishes a hole to a precise size and surface finish.','Escariador \u2014 agranda/termina un agujero a un tama\u00F1o y acabado precisos.'),
          L('Tapping tool \u2014 cuts internal threads in a hole.','Macho de roscar \u2014 corta roscas internas en un agujero.'),
          L('Center drill \u2014 short, pointed; starts a hole so a larger drill goes straight and does not wander.','Broca de centrar \u2014 corta y puntiaguda; inicia un agujero para que la broca grande entre recta sin desviarse.'),
          L('Chamfer & radius tools \u2014 bevel or round an edge to deburr or prepare for assembly.','Herramientas de chafl\u00E1n y radio \u2014 biselan o redondean un borde para desbarbar o preparar el ensamble.')]}
   ],
   quiz:[
     {tag:'check',stem:L('Which cutter is used to machine CURVED surfaces and contours in a cavity?','\u00BFQu\u00E9 cortador mecaniza superficies CURVAS y contornos en una cavidad?'),
      opts:[L('Flat end mill','Fresa de punta plana'),L('Ball end mill','Fresa de punta esf\u00E9rica'),L('Keyway cutter','Cortador de chavetero'),L('Center drill','Broca de centrar')],a:1,
      fb:L('Ball end mills have a rounded tip for curved surfaces and contours.','Las fresas de punta esf\u00E9rica tienen punta redondeada para superficies curvas y contornos.')},
     {tag:'check',stem:L('Which tool finishes a hole to a precise size and finish?','\u00BFQu\u00E9 herramienta termina un agujero a un tama\u00F1o y acabado precisos?'),
      opts:[L('Tapping tool','Macho de roscar'),L('Reamer','Escariador'),L('Shell mill','Fresa de planear'),L('Chamfer tool','Herramienta de chafl\u00E1n')],a:1,
      fb:L('A reamer enlarges and finishes a hole to a precise size.','El escariador agranda y termina un agujero a un tama\u00F1o preciso.')},
     {tag:'check',stem:L('Why use a center drill before a larger drill bit?','\u00BFPor qu\u00E9 usar una broca de centrar antes de una broca grande?'),
      opts:[L('To cut threads','Para cortar roscas'),L('To keep the larger drill centered so it does not wander','Para mantener la broca grande centrada y que no se desv\u00EDe'),L('To deburr the part','Para desbarbar la pieza'),L('To cool the hole','Para enfriar el agujero')],a:1,
      fb:L('The center drill starts a true hole so the larger bit goes straight.','La broca de centrar inicia un agujero verdadero para que la broca grande entre recta.')}
   ]},

  {id:'m3l5',
   title:L('Cutter Feeds & Speeds','Avances y Velocidades de Corte'),
   obj:L('Explain how cutter size relates to surface speed and feed, and let CAM set them from the material.','Explicar c\u00F3mo el tama\u00F1o del cortador se relaciona con la velocidad y el avance, y dejar que CAM los ajuste seg\u00FAn el material.'),
   body:[
     {p:L('Fusion360 CAM only needs the material you are cutting; it then sets cutter feeds and speeds. In general, smaller cutters run faster (higher surface speed) than larger cutters.','Fusion360 CAM solo necesita el material que cortas; luego ajusta los avances y velocidades. En general, los cortadores peque\u00F1os giran m\u00E1s r\u00E1pido (mayor velocidad superficial) que los grandes.')},
     {h:L('General aluminum example','Ejemplo general en aluminio')},
     {ul:[L('1 mm cutter: ~500\u2013700 m/min surface speed, ~0.05\u20130.07 mm/rev feed.','Cortador de 1 mm: ~500\u2013700 m/min de velocidad superficial, ~0.05\u20130.07 mm/rev de avance.'),
          L('10 mm cutter: ~200\u2013400 m/min, ~0.15\u20130.25 mm/rev.','Cortador de 10 mm: ~200\u2013400 m/min, ~0.15\u20130.25 mm/rev.'),
          L('25 mm cutter: ~75\u2013150 m/min, ~0.60\u20130.90 mm/rev.','Cortador de 25 mm: ~75\u2013150 m/min, ~0.60\u20130.90 mm/rev.'),
          L('50 mm cutter: ~40\u201380 m/min, ~1.50\u20133.00 mm/rev.','Cortador de 50 mm: ~40\u201380 m/min, ~1.50\u20133.00 mm/rev.')]}
   ],
   tip:L('Let CAM pick the starting numbers from the material, then fine-tune by ear and chip color. Smaller cutter \u2192 higher surface speed, smaller feed per rev.','Deja que CAM elija los n\u00FAmeros iniciales seg\u00FAn el material, luego aj\u00FAstalos por o\u00EDdo y color de viruta. Cortador m\u00E1s peque\u00F1o \u2192 mayor velocidad, menor avance por vuelta.'),
   quiz:[
     {tag:'check',stem:L('In general, how do smaller cutters run compared with larger cutters?','En general, \u00BFc\u00F3mo giran los cortadores peque\u00F1os frente a los grandes?'),
      opts:[L('Slower','M\u00E1s lento'),L('Faster (higher surface speed)','M\u00E1s r\u00E1pido (mayor velocidad superficial)'),L('At the same speed','A la misma velocidad'),L('They cannot cut aluminum','No pueden cortar aluminio')],a:1,
      fb:L('Smaller cutters run faster; larger cutters run slower with a bigger feed per rev.','Los cortadores peque\u00F1os giran m\u00E1s r\u00E1pido; los grandes m\u00E1s lento con mayor avance por vuelta.')},
     {tag:'check',stem:L('What single input does Fusion360 CAM most need to set feeds and speeds?','\u00BFQu\u00E9 dato principal necesita Fusion360 CAM para ajustar avances y velocidades?'),
      opts:[L('The material being cut','El material que se corta'),L('The shop\u2019s zip code','El c\u00F3digo postal del taller'),L('The operator\u2019s name','El nombre del operador'),L('The part color','El color de la pieza')],a:0,
      fb:L('Give CAM the material and it sets the cutter feeds and speeds.','Dale a CAM el material y ajustar\u00E1 los avances y velocidades.')}
   ]},

  {id:'m3l6',
   title:L('Navigating Fusion360 Hubs & Projects','Navegar Hubs y Proyectos de Fusion360'),

     {p:L('Fusion360 includes CAM for creating and editing CNC toolpaths and a data-exchange module to import/export with other platforms. The workflow assumes Fusion360 is installed and running.','Fusion360 incluye CAM para crear y editar trayectorias CNC y un m\u00F3dulo de intercambio de datos para importar/exportar con otras plataformas. El flujo asume que Fusion360 est\u00E1 instalado y funcionando.')},
     {h:L('Joining a team project','Unirse a un proyecto de equipo')},

   ]},

  {id:'m3l7',
   title:L('CAM Cutter Path Types','Tipos de Trayectoria CAM'),

     {ul:[L('Profile milling \u2014 machines outer contours or profiles.','Fresado de perfil \u2014 mecaniza contornos o perfiles exteriores.'),
          L('Pocket milling \u2014 machines pockets or cavities.','Fresado de cajera \u2014 mecaniza cajeras o cavidades.'),
          L('Contour milling \u2014 machines contoured surfaces or features.','Fresado de contorno \u2014 mecaniza superficies o caracter\u00EDsticas contorneadas.'),

     {tag:'check',stem:L('Which toolpath is used to machine complex 3D cavity surfaces?','\u00BFQu\u00E9 trayectoria mecaniza superficies 3D complejas de cavidad?'),
      opts:[L('Face milling','Fresado de planeado'),L('3D contouring','Contorneado 3D'),L('Profile milling','Fresado de perfil'),L('Facing','Planeado')],a:1,
