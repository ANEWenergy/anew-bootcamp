  {id:'m3l8',
   title:L('Stock Setup & Roughing','Configuraci\u00F3n de Material y Desbaste'),
   obj:L('Set up the workpiece stock and G54 origin, then generate and simulate a roughing path.','Configurar el material de la pieza y el origen G54, luego generar y simular una trayectoria de desbaste.'),
   body:[
     {p:L('CAM programming starts by defining the workpiece stock and the part origin, then generating the first roughing cutter path and simulating it before cutting steel or aluminum.','La programaci\u00F3n CAM comienza definiendo el material de la pieza y el origen, luego genera la primera trayectoria de desbaste y la simula antes de cortar.')},
     {ul:[L('Define the stock (the raw block the cutter starts from).','Define el material (el bloque en bruto del que parte el cortador).'),
          L('Set the work origin (G54) so the machine and the program agree on zero.','Fija el origen de trabajo (G54) para que la m\u00E1quina y el programa coincidan en el cero.'),
          L('Generate the roughing path, then simulate it to verify before machining.','Genera la trayectoria de desbaste, luego simula para verificar antes de mecanizar.')]}
   ],
   quiz:[
     {tag:'check',stem:L('What does the G54 setting define in a CAM program?','\u00BFQu\u00E9 define la configuraci\u00F3n G54 en un programa CAM?'),
      opts:[L('The coolant flow','El flujo de refrigerante'),L('The work origin (zero) the machine and program share','El origen de trabajo (cero) que comparten m\u00E1quina y programa'),L('The spindle color','El color del husillo'),L('The part material','El material de la pieza')],a:1,
      fb:L('G54 sets the work origin so machine and program agree on zero.','G54 fija el origen de trabajo para que m\u00E1quina y programa coincidan en el cero.')},
     {tag:'check',stem:L('What should you do with a roughing path before cutting metal?','\u00BFQu\u00E9 debes hacer con una trayectoria de desbaste antes de cortar metal?'),
      opts:[L('Email it to the client','Enviarla por correo al cliente'),L('Simulate it to verify','Simularla para verificar'),L('Texture it','Texturizarla'),L('Anodize it','Anodizarla')],a:1,
      fb:L('Generate, then simulate the roughing path to verify before machining.','Genera y luego simula la trayectoria de desbaste para verificar antes de mecanizar.')},
     {tag:'recall',stem:L('"Stock" in CAM refers to:','El "material" (stock) en CAM se refiere a:'),
      opts:[L('The finished part','La pieza terminada'),L('The raw block the cutter starts from','El bloque en bruto del que parte el cortador'),L('The toolpath file','El archivo de trayectoria'),L('The coolant tank','El tanque de refrigerante')],a:1,
      fb:L('Stock is the raw block of material the cutter begins removing from.','El material es el bloque en bruto del que el cortador empieza a remover.')}
   ]},

  {id:'m3l9',
   title:L('Cavity & Core Sculpting (Micro Cutters)','Escultura de Cavidad y N\u00FAcleo (Microcortadores)'),
   obj:L('Apply the finishing-pass rule that protects small cutters and gives the best finish.','Aplicar la regla del pase de acabado que protege los cortadores peque\u00F1os y da el mejor acabado.'),
   body:[
     {p:L('High-precision, high-resolution cutter paths come AFTER the roughing passes. Small cutters break easily on large step-downs and step-overs, so the finishing strategy matters.','Las trayectorias de alta precisi\u00F3n y resoluci\u00F3n van DESPU\u00C9S del desbaste. Los cortadores peque\u00F1os se rompen f\u00E1cil con grandes pasos hacia abajo y de lado, as\u00ED que la estrategia de acabado importa.')},
     {ul:[L('Crank up the spindle speed and slow down the feed for the best finish.','Aumenta la velocidad del husillo y reduce el avance para el mejor acabado.'),
          L('Leave about 0.05 mm for the final finishing pass.','Deja unos 0.05 mm para el pase de acabado final.'),
          L('That small leftover stock keeps the micro cutter from breaking and gives the best finish regardless of cutter size.','Ese peque\u00F1o sobrante evita que el microcortador se rompa y da el mejor acabado sin importar el tama\u00F1o.')]}
   ],
   tip:L('Roughing first, finishing last: high speed + low feed + ~0.05 mm finish stock is the recipe that protects micro cutters and produces a clean cavity surface.','Primero desbaste, al final acabado: alta velocidad + bajo avance + ~0.05 mm de sobrante es la receta que protege microcortadores y da una cavidad limpia.'),
   quiz:[
     {tag:'check',stem:L('How much stock should you leave for the final finishing pass on a cavity?','\u00BFCu\u00E1nto material debes dejar para el pase de acabado final en una cavidad?'),
      opts:[L('About 0.05 mm','Aprox. 0.05 mm'),L('About 1 mm','Aprox. 1 mm'),L('About 5 mm','Aprox. 5 mm'),L('Zero','Cero')],a:0,
      fb:L('Leave ~0.05 mm so the micro cutter does not break and the finish is best.','Deja ~0.05 mm para que el microcortador no se rompa y el acabado sea \u00F3ptimo.')},
     {tag:'check',stem:L('For the best finish on a fine cavity pass, you should:','Para el mejor acabado en un pase fino de cavidad, debes:'),
      opts:[L('Crank up speed and slow down feed','Aumentar la velocidad y reducir el avance'),L('Slow speed and increase feed','Reducir la velocidad y aumentar el avance'),L('Take a large step-down','Tomar un gran paso hacia abajo'),L('Skip roughing','Saltar el desbaste')],a:0,
      fb:L('High spindle speed with a slow feed gives the cleanest finish.','Alta velocidad de husillo con avance lento da el acabado m\u00E1s limpio.')},
     {tag:'check',stem:L('When do high-precision finishing paths run relative to roughing?','\u00BFCu\u00E1ndo corren los pases de acabado de alta precisi\u00F3n respecto al desbaste?'),
      opts:[L('Before roughing','Antes del desbaste'),L('After roughing is complete','Despu\u00E9s de completar el desbaste'),L('Instead of roughing','En lugar del desbaste'),L('During setup','Durante la preparaci\u00F3n')],a:1,
      fb:L('Finishing paths come after the roughing passes are done.','Los pases de acabado van despu\u00E9s de terminar el desbaste.')}
   ]},

  {id:'m3l10',
   title:L('Hole Making: Drills, Reamers & Threads','Hacer Agujeros: Brocas, Escariadores y Roscas'),
   obj:L('Order the hole-making routine from center drill through chamfer.','Ordenar la rutina de hacer agujeros, desde la broca de centrar hasta el chafl\u00E1n.'),
   body:[
     {p:L('Fusion360 has pre-defined hole routines: center drill, deep-hole drilling, reamer, tapping, and chamfer. Run them in the right order for straight, strong, clean holes.','Fusion360 tiene rutinas predefinidas: broca de centrar, taladrado profundo, escariado, roscado y chafl\u00E1n. Ejecútalas en el orden correcto para agujeros rectos, fuertes y limpios.')},
     {h:L('The routine','La rutina')},
     {ul:[L('Pre-drill with a center drill so the drill goes straight.','Pretaladra con una broca de centrar para que la broca entre recta.'),
          L('Use an undersize drill for holes that will be reamed or tapped.','Usa una broca de menor tama\u00F1o para agujeros que se escariar\u00E1n o roscar\u00E1n.'),
          L('Deep holes use a full-retract (peck) routine to clear chips from the hole.','Los agujeros profundos usan una rutina de retracci\u00F3n completa (picoteo) para sacar la viruta.'),
          L('Drill through, then slow down the reamers for size and finish.','Taladra a trav\u00E9s, luego reduce la velocidad de los escariadores para tama\u00F1o y acabado.'),
          L('Tap holes to a depth about 2\u00D7 the thread diameter for full strength.','Rosca a una profundidad de aprox. 2\u00D7 el di\u00E1metro de la rosca para resistencia total.'),
          L('Chamfer the hole edge so screws start easily.','Achaflana el borde del agujero para que los tornillos entren f\u00E1cil.')]}
   ],
   tip:L('Tap depth \u2248 2\u00D7 the thread diameter gives full thread strength; a center drill first keeps every following hole on center.','Profundidad de rosca \u2248 2\u00D7 el di\u00E1metro da resistencia total; la broca de centrar primero mantiene cada agujero centrado.'),
   quiz:[
     {tag:'check',stem:L('To achieve full thread strength, tap to a depth of about:','Para lograr resistencia total de rosca, rosca a una profundidad de aprox.:'),
      opts:[L('0.5\u00D7 the thread diameter','0.5\u00D7 el di\u00E1metro de la rosca'),L('2\u00D7 the thread diameter','2\u00D7 el di\u00E1metro de la rosca'),L('5\u00D7 the thread diameter','5\u00D7 el di\u00E1metro de la rosca'),L('10\u00D7 the thread diameter','10\u00D7 el di\u00E1metro de la rosca')],a:1,
      fb:L('Tap about 2\u00D7 the thread diameter deep for full strength.','Rosca aprox. 2\u00D7 el di\u00E1metro de profundidad para resistencia total.')},
     {tag:'check',stem:L('Why pre-drill with a center drill?','\u00BFPor qu\u00E9 pretaladrar con una broca de centrar?'),
      opts:[L('To chamfer the edge','Para achaflanar el borde'),L('To make the following drill go straight','Para que la broca siguiente entre recta'),L('To tap the thread','Para roscar'),L('To cool the hole','Para enfriar el agujero')],a:1,
      fb:L('The center drill starts the hole true so the next drill does not wander.','La broca de centrar inicia el agujero recto para que la siguiente no se desv\u00EDe.')},
     {tag:'check',stem:L('How do deep-hole routines clear chips?','\u00BFC\u00F3mo sacan la viruta las rutinas de agujero profundo?'),
      opts:[L('With a full-retract (peck) cycle','Con un ciclo de retracci\u00F3n completa (picoteo)'),L('By tapping','Roscando'),L('By chamfering','Achaflanando'),L('By reaming only','Solo escariando')],a:0,
      fb:L('Deep drilling uses a full-retract peck cycle to pull chips out of the hole.','El taladrado profundo usa un ciclo de retracci\u00F3n completa para sacar la viruta.')}
   ]},

  {id:'m3l11',
   title:L('Surface Treatments & Coatings','Tratamientos y Recubrimientos de Superficie'),
   obj:L('Match mold surface treatments to the performance they add, and account for added thickness.','Asociar tratamientos de superficie con el rendimiento que a\u00F1aden y considerar el espesor agregado.'),
   body:[

     {p:L('When the mold opens, the machine drives knockout bars forward against the mold\u2019s ejector plates, which push the ejector pins to release the part. Travel is limited by hard stops in the mold.','Cuando el molde abre, la m\u00E1quina empuja las barras de expulsi\u00F3n contra las placas expulsoras del molde, que mueven los pasadores para liberar la pieza. El recorrido lo limitan los topes duros del molde.')},

  {id:'m4l9',

   obj:L('Explain what clamp tonnage, injection speed, and hold time each control.','Explicar qu\u00E9 controla cada uno: tonelaje de cierre, velocidad de inyecci\u00F3n y tiempo de sostenimiento.'),
   body:[
     {ul:[L('Clamp tonnage keeps the mold closed against injection pressure; too little lets the mold open and flash.','El tonelaje de cierre mantiene el molde cerrado contra la presi\u00F3n; muy poco deja que el molde abra y rebabe.'),
          L('Injection speed sets how fast the cavity fills \u2014 it drives the fill pattern, shear, and surface finish.','La velocidad de inyecci\u00F3n define qu\u00E9 tan r\u00E1pido se llena la cavidad \u2014 controla el patr\u00F3n de llenado, el cizallamiento y el acabado.'),
          L('Hold (pack) pressure and time feed material in as the part cools to fight sink and short shots.','La presi\u00F3n y el tiempo de sostenimiento (compactaci\u00F3n) alimentan material mientras la pieza enfr\u00EDa para combatir el hundimiento y los disparos cortos.'),
          L('Hold ends at the gate-freeze point \u2014 holding longer than the gate stays open adds no material.','El sostenimiento termina en el punto de congelaci\u00F3n de la compuerta \u2014 sostener m\u00E1s tiempo del que la compuerta sigue abierta no a\u00F1ade material.')]}
   ],
   tip:L('Sink marks usually mean not enough pack/hold; flash usually means too little clamp or too much pressure. Diagnose which before you turn a dial.','Las marcas de hundimiento suelen ser falta de compactaci\u00F3n; la rebaba suele ser poco cierre o demasiada presi\u00F3n. Diagnostica cu\u00E1l antes de mover una perilla.'),
   quiz:[

     {tag:'check',stem:L('What does clamp tonnage primarily prevent?','\u00BF Qu\u00E9 evita principalmente el tonelaje de cierre?'),
      opts:[L('The mold opening and flashing under pressure','Que el molde abra y rebabe bajo presi\u00F3n'),L('The dryer overheating','Que el secador se sobrecaliente'),L('The robot stalling','Que el robot se detenga'),L('Color streaks','Las estr\u00EDas de color')],a:0,
      fb:L('Enough clamp keeps the mold shut so it does not open and flash.','Suficiente cierre mantiene el molde cerrado para que no abra y rebabe.')},
     {tag:'check',stem:L('Holding pressure LONGER than the gate-freeze point will:','Sostener presi\u00F3n M\u00C1S TIEMPO del punto de congelaci\u00F3n de la compuerta:'),
      opts:[L('Add no more material to the part','No a\u00F1ade m\u00E1s material a la pieza'),L('Always remove flash','Siempre elimina la rebaba'),L('Cool the barrel','Enfr\u00EDa el barril'),L('Increase clamp tonnage','Aumenta el tonelaje')],a:0,
      fb:L('Once the gate freezes, extra hold time adds nothing \u2014 it only lengthens the cycle.','Una vez congelada la compuerta, m\u00E1s sostenimiento no a\u00F1ade nada \u2014 solo alarga el ciclo.')}
   ]},

  {id:'m4l10',

     {tag:'recall',stem:L('What circulates through the mold to control its temperature?','\u00BF Qu\u00E9 circula por el molde para controlar su temperatura?'),
      opts:[L('Water or oil from an auxiliary unit','Agua o aceite de una unidad auxiliar'),L('Compressed air only','Solo aire comprimido'),L('Molten plastic','Pl\u00E1stico fundido'),L('Nothing','Nada')],a:0,

  {id:'m4l11',
   title:L('Flash Then Pull Back; Troubleshooting','Rebabear y Reducir; Soluci\u00F3n de Problemas'),

   body:[
     {p:L('A common process-finding method: deliberately push pressure until the mold just flashes, confirming the cavity is full, then pull pressure back until the flash just disappears. That edge is a good full-fill starting point.','Un m\u00E9todo com\u00FAn: empuja la presi\u00F3n hasta que el molde apenas rebabe, confirmando que la cavidad est\u00E1 llena, luego reduce la presi\u00F3n hasta que la rebaba apenas desaparezca. Ese borde es un buen punto de partida de llenado completo.')},
     {h:L('Common defects and first checks','Defectos comunes y primeras verificaciones')},
     {ul:[L('Short shot \u2014 not enough material/pressure or poor venting; increase fill or improve venting.','Disparo corto \u2014 falta material/presi\u00F3n o mal venteo; aumenta el llenado o mejora el venteo.'),
          L('Flash \u2014 too much pressure or too little clamp; pull back pressure or add tonnage.','Rebaba \u2014 demasiada presi\u00F3n o poco cierre; reduce la presi\u00F3n o a\u00F1ade tonelaje.'),
          L('Sink \u2014 under-packing thick sections; add pack/hold.','Hundimiento \u2014 falta de compactaci\u00F3n en secciones gruesas; a\u00F1ade compactaci\u00F3n.'),
          L('Splay/streaks \u2014 wet (undried) hygroscopic material; dry it properly.','R\u00E1fagas/estr\u00EDas \u2014 material higrosc\u00F3pico h\u00FAmedo (sin secar); s\u00E9calo bien.'),
          L('Burn marks \u2014 trapped air with nowhere to vent; improve venting or slow fill.','Quemaduras \u2014 aire atrapado sin v\u00EDa de escape; mejora el venteo o baja la velocidad.')]}
   ],
   tip:L('Flash then pull back until no flash gives a repeatable full-fill point. Change one setting at a time and watch a single defect.','Rebabear y luego reducir hasta que no haya rebaba da un punto repetible de llenado completo. Cambia un ajuste a la vez y observa un solo defecto.'),
   quiz:[
     {tag:'check',stem:L('In the flash-then-pull-back method, after the mold just flashes you:','En el m\u00E9todo de rebabear-y-reducir, despu\u00E9s de que el molde apenas rebabe t\u00FA:'),
      opts:[L('Pull pressure back until the flash just disappears','Reduces la presi\u00F3n hasta que la rebaba apenas desaparezca'),L('Push pressure even higher','Subes la presi\u00F3n a\u00FAn m\u00E1s'),L('Shut the machine down','Apagas la m\u00E1quina'),L('Change the resin','Cambias la resina')],a:0,
      fb:L('Flash confirms a full cavity; pulling back to no-flash gives a good fill point.','La rebaba confirma cavidad llena; reducir hasta sin-rebaba da un buen punto de llenado.')},
     {tag:'check',stem:L('Burn marks on a part most often point to:','Las quemaduras en una pieza apuntan con m\u00E1s frecuencia a:'),
      opts:[L('Trapped air / poor venting','Aire atrapado / mal venteo'),L('Too much clamp tonnage','Demasiado tonelaje'),L('A cold dryer','Un secador fr\u00EDo'),L('Wrong locator ring','Anillo localizador equivocado')],a:0,
      fb:L('Trapped air with no vent compresses and burns; improve venting or slow the fill.','El aire atrapado sin venteo se comprime y quema; mejora el venteo o baja la velocidad.')},
     {tag:'check',stem:L('A short shot is best first addressed by:','Un disparo corto se atiende primero mejor con:'),
      opts:[L('More fill/pressure or better venting','M\u00E1s llenado/presi\u00F3n o mejor venteo'),L('Lowering melt temperature','Bajar la temperatura del material'),L('Removing the ejector pins','Quitar los pasadores'),L('Adding part color','A\u00F1adir color')],a:0,
      fb:L('Short shots need more material/pressure or a vent for trapped air.','Los disparos cortos necesitan m\u00E1s material/presi\u00F3n o un venteo para el aire atrapado.')}
   ]},

  {id:'m4l12',
   title:L('Tuning, Color Changes, Robotics & Inspection','Ajuste, Cambios de Color, Rob\u00F3tica e Inspecci\u00F3n'),
   obj:L('Describe tuning priorities, color changes, robotic part handling, inline inspection, and insert molding.','Describir prioridades de ajuste, cambios de color, manejo rob\u00F3tico, inspecci\u00F3n en l\u00EDnea y moldeo con insertos.'),
   body:[
     {p:L('Once parts run, you pull the mold to tune the tool, then tune the PROCESS in a priority order: cosmetics, then dimensional stability, then cycle time \u2014 quality first, speed last.','Una vez que corren piezas, retiras el molde para ajustar la herramienta, luego ajustas el PROCESO en orden de prioridad: cosm\u00E9tica, luego estabilidad dimensional, luego tiempo de ciclo \u2014 calidad primero, velocidad al final.')},
     {ul:[L('Color change: purge the barrel fully until the old color is gone before running the new one.','Cambio de color: purga el barril por completo hasta que el color viejo desaparezca antes de correr el nuevo.'),
          L('Robotics assist degating and part handling \u2014 a robot or sprue picker removes parts/runners consistently and safely.','La rob\u00F3tica asiste el desgatado y manejo \u2014 un robot o extractor de colada retira piezas/canales de forma consistente y segura.'),
          L('Inline inspection checks parts during the run (vision or gauging) so defects are caught early, not after a full batch.','La inspecci\u00F3n en l\u00EDnea revisa piezas durante la corrida (visi\u00F3n o calibrado) para detectar defectos temprano, no tras un lote completo.'),
          L('Insert molding places a metal or plastic insert in the cavity (manual or automated) so plastic molds around it.','El moldeo con insertos coloca un inserto met\u00E1lico o pl\u00E1stico en la cavidad (manual o automatizado) para que el pl\u00E1stico se moldee a su alrededor.')]}
   ],
   tip:L('Tune in order: get it looking right, then dimensionally stable, then fast. Chasing cycle time before cosmetics and dimensions are locked usually undoes both.','Ajusta en orden: que se vea bien, luego dimensionalmente estable, luego r\u00E1pido. Perseguir el tiempo de ciclo antes de fijar cosm\u00E9tica y dimensiones suele arruinar ambas.'),
   quiz:[
     {tag:'check',stem:L('What is the correct priority order for tuning the process?','\u00BF Cu\u00E1l es el orden de prioridad correcto para ajustar el proceso?'),
      opts:[L('Cosmetics, then dimensional stability, then cycle time','Cosm\u00E9tica, luego estabilidad dimensional, luego tiempo de ciclo'),L('Cycle time first, always','Tiempo de ciclo primero, siempre'),L('Color, then packaging','Color, luego empaque'),L('Random order','Orden aleatorio')],a:0,
      fb:L('Quality first: cosmetics, then dimensions, then speed.','Calidad primero: cosm\u00E9tica, luego dimensiones, luego velocidad.')},
     {tag:'check',stem:L('What is insert molding?','\u00BF Qu\u00E9 es el moldeo con insertos?'),
      opts:[L('Placing an insert in the cavity so plastic molds around it','Colocar un inserto en la cavidad para que el pl\u00E1stico se moldee alrededor'),L('Removing flash by hand','Quitar rebaba a mano'),L('Drying the resin','Secar la resina'),L('Polishing the mold','Pulir el molde')],a:0,
      fb:L('A metal/plastic insert is set in the cavity (manual or automated) and over-molded.','Un inserto met\u00E1lico/pl\u00E1stico se coloca en la cavidad (manual o automatizado) y se sobremoldea.')},
     {tag:'recall',stem:L('Before running a new color, you must first:','Antes de correr un color nuevo, primero debes:'),
      opts:[L('Purge the barrel of the old color','Purgar el barril del color viejo'),L('Lower the clamp tonnage','Bajar el tonelaje de cierre'),L('Remove the robot','Quitar el robot'),L('Skip inspection','Saltar la inspecci\u00F3n')],a:0,
      fb:L('Purge fully so the previous color is gone before the new color runs.','Purga por completo para que el color anterior desaparezca antes del nuevo.')}
   ]}
 ]
