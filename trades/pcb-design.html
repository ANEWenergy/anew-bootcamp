/* trades/pcb.js — Printed Circuit Board Design & Manufacturing
   Loaded on demand by the index.html hub. Relies on the global helper

(function(){
'use strict';
var _L = (typeof L==='function') ? L : function(en,es){return {en:en,es:es||en};};

/* ---------- Module 1: PCB Design with Microprocessors ---------- */
var P1 = {
 id:'p1',
 title:_L('PCB Design with Microprocessors','Dise\u00f1o de PCB con Microprocesadores'),
 sub:_L('10 lessons \u00b7 Level 1','10 lecciones \u00b7 Nivel 1'),
 lessons:[
  {id:'p1l1',
   title:_L('Schematic Capture & Design Files','Captura de Esquemas y Archivos de Dise\u00f1o'),
   obj:_L('Identify the core schematic-capture outputs and what each one feeds downstream.','Identificar las salidas principales de la captura de esquemas y qu\u00e9 alimenta cada una.'),
   body:[
     {p:_L('Schematic capture is where the design begins: you place components and draw the electrical connections between them. The schematic then generates the files the rest of the flow depends on.','La captura de esquemas es donde empieza el dise\u00f1o: colocas componentes y dibujas las conexiones el\u00e9ctricas entre ellos. El esquema genera luego los archivos de los que depende el resto del flujo.')},
     {h:_L('Key outputs','Salidas clave')},
     {ul:[_L('Netlist \u2014 the master list of which pins connect to which nets; the layout tool uses it to enforce connectivity.','Netlist \u2014 la lista maestra de qu\u00e9 pines conectan con qu\u00e9 nodos; la herramienta de layout la usa para forzar la conectividad.'),
          _L('BOM (Bill of Materials) \u2014 every part, quantity, and value needed to build the board.','BOM (Lista de Materiales) \u2014 cada pieza, cantidad y valor necesarios para construir la placa.'),
          _L('Reference designators \u2014 unique labels (R1, C3, U2) that tie a schematic symbol to a physical part.','Designadores de referencia \u2014 etiquetas \u00fanicas (R1, C3, U2) que vinculan un s\u00edmbolo del esquema con una pieza f\u00edsica.'),
          _L('Footprints / land patterns \u2014 the copper pad shapes each part solders to on the board.','Huellas / patrones de tierra \u2014 las formas de pad de cobre donde se suelda cada pieza en la placa.')]}],
   tip:_L('A footprint that does not match the real part is the most common cause of an unbuildable first board \u2014 verify against the datasheet.','Una huella que no coincide con la pieza real es la causa m\u00e1s com\u00fan de una primera placa no fabricable \u2014 verifica contra la hoja de datos.'),
   quiz:[
     {tag:'check',stem:_L('Which file tells the layout tool which pins must be electrically connected?','\u00bfQu\u00e9 archivo le dice a la herramienta de layout qu\u00e9 pines deben estar conectados el\u00e9ctricamente?'),
      opts:[_L('BOM','BOM'),_L('Netlist','Netlist'),_L('Gerber','Gerber'),_L('Silkscreen','Serigraf\u00eda')],a:1,
      fb:_L('The netlist is the connectivity master list driving the layout.','El netlist es la lista maestra de conectividad que gu\u00eda el layout.')},
     {tag:'check',stem:_L('R1, C3 and U2 are examples of what?','\u00bfR1, C3 y U2 son ejemplos de qu\u00e9?'),
      opts:[_L('Net names','Nombres de nodos'),_L('Reference designators','Designadores de referencia'),_L('Layer names','Nombres de capa'),_L('Footprints','Huellas')],a:1,
      fb:_L('Reference designators uniquely label each component.','Los designadores de referencia etiquetan de forma \u00fanica cada componente.')},
     {tag:'recall',stem:_L('The land pattern a part solders to is called its:','El patr\u00f3n al que se suelda una pieza se llama su:'),
      opts:[_L('Netlist','Netlist'),_L('Footprint','Huella'),_L('BOM line','L\u00ednea de BOM')],a:1,
      fb:_L('The footprint (land pattern) defines the solder pads.','La huella (patr\u00f3n de tierra) define los pads de soldadura.')}]},
  {id:'p1l2',
   title:_L('PCB Stackup & Materials','Apilado de PCB y Materiales'),
   obj:_L('Describe what a layer stackup is and the role of copper weight and FR-4 substrate.','Describir qu\u00e9 es un apilado de capas y el rol del peso del cobre y el sustrato FR-4.'),
   body:[
     {p:_L('The stackup is the cross-section of the board: how many copper layers, how thick each is, and what insulating material separates them.','El apilado es la secci\u00f3n transversal de la placa: cu\u00e1ntas capas de cobre, qu\u00e9 grosor tiene cada una y qu\u00e9 material aislante las separa.')},
     {ul:[_L('Layer count \u2014 2-layer boards are cheapest; 4+ layers add dedicated power and ground planes for cleaner signals.','N\u00famero de capas \u2014 las de 2 capas son las m\u00e1s baratas; 4+ capas a\u00f1aden planos dedicados de potencia y tierra para se\u00f1ales m\u00e1s limpias.'),
          _L('Copper weight \u2014 measured in oz/ft\u00b2; 1 oz is typical, heavier copper carries more current.','Peso del cobre \u2014 medido en oz/ft\u00b2; 1 oz es t\u00edpico, cobre m\u00e1s grueso conduce m\u00e1s corriente.'),
          _L('FR-4 \u2014 the standard glass-epoxy substrate; specialized substrates exist for high-frequency or high-temperature work.','FR-4 \u2014 el sustrato est\u00e1ndar de vidrio-epoxi; existen sustratos especializados para alta frecuencia o alta temperatura.')]}],
   quiz:[
     {tag:'check',stem:_L('What is the most common PCB substrate material?','\u00bfCu\u00e1l es el material de sustrato de PCB m\u00e1s com\u00fan?'),
      opts:[_L('Aluminum','Aluminio'),_L('FR-4 glass-epoxy','Vidrio-epoxi FR-4'),_L('Ceramic','Cer\u00e1mica'),_L('Polyimide film','Pel\u00edcula de poliimida')],a:1,
      fb:_L('FR-4 glass-epoxy is the industry default substrate.','El vidrio-epoxi FR-4 es el sustrato est\u00e1ndar de la industria.')},
     {tag:'check',stem:_L('You need more current capacity on a trace. Which stackup choice helps most directly?','Necesitas m\u00e1s capacidad de corriente en una pista. \u00bfQu\u00e9 elecci\u00f3n de apilado ayuda m\u00e1s directamente?'),
      opts:[_L('Heavier copper weight','Mayor peso del cobre'),_L('Thinner substrate','Sustrato m\u00e1s delgado'),_L('More silkscreen','M\u00e1s serigraf\u00eda'),_L('Smaller vias','V\u00edas m\u00e1s peque\u00f1as')],a:0,
      fb:_L('Heavier copper (more oz/ft\u00b2) carries more current.','M\u00e1s cobre (m\u00e1s oz/ft\u00b2) conduce m\u00e1s corriente.')}]},
  {id:'p1l3',
   title:_L('Microprocessor I/O & Logic Levels','E/S del Microprocesador y Niveles L\u00f3gicos'),
   obj:_L('Distinguish push-pull, open-drain and tri-state outputs and recognize when level shifting is needed.','Distinguir salidas push-pull, drenaje abierto y triestado y reconocer cu\u00e1ndo se necesita cambio de nivel.'),
   body:[
     {p:_L('A microprocessor pin drives or reads a logic level. How it drives that level \u2014 and at what voltage \u2014 determines what you connect to it.','Un pin de microprocesador controla o lee un nivel l\u00f3gico. C\u00f3mo controla ese nivel \u2014 y a qu\u00e9 voltaje \u2014 determina qu\u00e9 le conectas.')},
     {h:_L('Output types','Tipos de salida')},
     {ul:[_L('Push-pull \u2014 actively drives both high and low; the default for most signals.','Push-pull \u2014 controla activamente tanto alto como bajo; el predeterminado para la mayor\u00eda de se\u00f1ales.'),
          _L('Open-drain \u2014 only pulls low; needs an external pull-up resistor to go high (used by I2C).','Drenaje abierto \u2014 solo tira a bajo; necesita una resistencia pull-up externa para subir (lo usa I2C).'),
          _L('Tri-state \u2014 can be driven high, low, or released to high-impedance so others can share the line.','Triestado \u2014 puede ir alto, bajo o liberarse a alta impedancia para que otros compartan la l\u00ednea.')]},
     {h:_L('Logic families & voltage','Familias l\u00f3gicas y voltaje')},
     {ul:[_L('TTL, CMOS, LVCMOS and LVDS each define their own high/low thresholds.','TTL, CMOS, LVCMOS y LVDS definen cada uno sus propios umbrales alto/bajo.'),
          _L('When two devices use different voltages (e.g. 3.3 V and 5 V), a level shifter translates between them.','Cuando dos dispositivos usan voltajes distintos (p. ej. 3.3 V y 5 V), un cambiador de nivel traduce entre ellos.')]}],
   tip:_L('Pull-ups and pull-downs set a defined idle state so a floating input does not read random noise.','Los pull-ups y pull-downs fijan un estado de reposo definido para que una entrada flotante no lea ruido aleatorio.'),
   quiz:[
     {tag:'check',stem:_L('An I2C bus line needs which output type plus an external resistor to go high?','\u00bfUna l\u00ednea de bus I2C necesita qu\u00e9 tipo de salida m\u00e1s una resistencia externa para subir?'),
      opts:[_L('Push-pull','Push-pull'),_L('Open-drain','Drenaje abierto'),_L('Tri-state','Triestado'),_L('LVDS','LVDS')],a:1,
      fb:_L('I2C uses open-drain with pull-up resistors so any device can pull the line low.','I2C usa drenaje abierto con resistencias pull-up para que cualquier dispositivo tire a bajo.')},
     {tag:'check',stem:_L('A 3.3 V microcontroller must talk to a 5 V sensor. What do you add?','Un microcontrolador de 3.3 V debe comunicarse con un sensor de 5 V. \u00bfQu\u00e9 a\u00f1ades?'),
      opts:[_L('A level shifter','Un cambiador de nivel'),_L('A bigger crystal','Un cristal m\u00e1s grande'),_L('A heatsink','Un disipador'),_L('A ferrite bead','Una perla de ferrita')],a:0,
      fb:_L('A level shifter safely translates between the two logic voltages.','Un cambiador de nivel traduce de forma segura entre los dos voltajes l\u00f3gicos.')},
     {tag:'recall',stem:_L('Which output can release to high-impedance so others share the line?','\u00bfQu\u00e9 salida puede liberarse a alta impedancia para compartir la l\u00ednea?'),
      opts:[_L('Push-pull','Push-pull'),_L('Tri-state','Triestado'),_L('Open-drain','Drenaje abierto')],a:1,
      fb:_L('Tri-state outputs can go high-Z to release a shared bus.','Las salidas triestado pueden ir a alta-Z para liberar un bus compartido.')}]},
  {id:'p1l4',
   title:_L('Clocking & Timing','Reloj y Temporizaci\u00f3n'),
   obj:_L('Explain why a processor needs a clock and what jitter, propagation delay and rise/fall time mean.','Explicar por qu\u00e9 un procesador necesita un reloj y qu\u00e9 significan jitter, retardo de propagaci\u00f3n y tiempo de subida/bajada.'),
   body:[
     {p:_L('Digital systems step forward on a clock edge. Crystals and oscillators generate that clock; distributing it cleanly keeps every part of the system in step.','Los sistemas digitales avanzan en un flanco de reloj. Cristales y osciladores generan ese reloj; distribuirlo limpiamente mantiene todo el sistema sincronizado.')},
     {ul:[_L('Crystal vs oscillator \u2014 a crystal is a passive resonator needing on-chip circuitry; an oscillator is a complete clock source.','Cristal vs oscilador \u2014 un cristal es un resonador pasivo que necesita circuiter\u00eda en el chip; un oscilador es una fuente de reloj completa.'),
          _L('Jitter \u2014 small timing variations between clock edges; too much corrupts fast data.','Jitter \u2014 peque\u00f1as variaciones de tiempo entre flancos de reloj; demasiado corrompe datos r\u00e1pidos.'),
          _L('Propagation delay \u2014 the time a signal takes to travel; matters when signals must arrive together.','Retardo de propagaci\u00f3n \u2014 el tiempo que tarda una se\u00f1al en viajar; importa cuando las se\u00f1ales deben llegar juntas.'),
          _L('Rise/fall time \u2014 how quickly a signal transitions; faster edges carry higher-frequency content.','Tiempo de subida/bajada \u2014 qu\u00e9 tan r\u00e1pido cambia una se\u00f1al; flancos m\u00e1s r\u00e1pidos llevan contenido de mayor frecuencia.')]}],
   quiz:[
     {tag:'check',stem:_L('Small, random variation in the timing of clock edges is called:','La peque\u00f1a variaci\u00f3n aleatoria en el tiempo de los flancos de reloj se llama:'),
      opts:[_L('Jitter','Jitter'),_L('Ripple','Rizado'),_L('Crosstalk','Diafon\u00eda'),_L('Drift','Deriva')],a:0,
      fb:_L('Jitter is edge-to-edge timing variation.','El jitter es la variaci\u00f3n de tiempo flanco a flanco.')},
     {tag:'check',stem:_L('Which is a complete, self-contained clock source?','\u00bfCu\u00e1l es una fuente de reloj completa y aut\u00f3noma?'),
      opts:[_L('A bare crystal','Un cristal desnudo'),_L('An oscillator','Un oscilador'),_L('A pull-up resistor','Una resistencia pull-up'),_L('A ferrite bead','Una perla de ferrita')],a:1,
      fb:_L('An oscillator is a complete clock source; a crystal needs supporting circuitry.','Un oscilador es una fuente completa; un cristal necesita circuiter\u00eda de apoyo.')}]},
  {id:'p1l5',
   title:_L('Decoupling & Bypass Strategy','Estrategia de Desacople y Bypass'),
   obj:_L('Explain why decoupling capacitors are placed close to power pins and what ESR/ESL affect.','Explicar por qu\u00e9 los capacitores de desacople se colocan cerca de los pines de alimentaci\u00f3n y qu\u00e9 afectan ESR/ESL.'),
   body:[
     {p:_L('When a chip switches, it demands a sudden gulp of current. A decoupling (bypass) capacitor sits right next to the power pin as a local reservoir so the supply voltage does not dip.','Cuando un chip conmuta, demanda un golpe s\u00fabito de corriente. Un capacitor de desacople (bypass) se ubica junto al pin de alimentaci\u00f3n como reservorio local para que el voltaje no caiga.')},
     {ul:[_L('Small ceramic bypass caps handle fast, high-frequency demand; bulk caps handle slower, larger swings.','Peque\u00f1os capacitores cer\u00e1micos de bypass manejan demanda r\u00e1pida de alta frecuencia; los de volumen manejan oscilaciones m\u00e1s lentas y grandes.'),
          _L('ESR (equivalent series resistance) and ESL (equivalent series inductance) limit how fast a cap can respond \u2014 lower is better for decoupling.','ESR (resistencia serie equivalente) y ESL (inductancia serie equivalente) limitan qu\u00e9 tan r\u00e1pido responde un capacitor \u2014 menor es mejor para desacople.'),
          _L('Place the smallest cap closest to the pin, with the shortest possible trace.','Coloca el capacitor m\u00e1s peque\u00f1o lo m\u00e1s cerca del pin, con la pista m\u00e1s corta posible.')]}],
   tip:_L('A great decoupling cap with a long, thin trace to the pin is wasted \u2014 the trace inductance undoes the benefit.','Un buen capacitor de desacople con una pista larga y delgada al pin se desperdicia \u2014 la inductancia de la pista anula el beneficio.'),
   quiz:[
     {tag:'check',stem:_L('Where should a decoupling capacitor be placed?','\u00bfD\u00f3nde debe colocarse un capacitor de desacople?'),
      opts:[_L('As close to the power pin as possible','Lo m\u00e1s cerca posible del pin de alimentaci\u00f3n'),_L('At the board edge','En el borde de la placa'),_L('Near the connector','Cerca del conector'),_L('Anywhere on the ground plane','En cualquier parte del plano de tierra')],a:0,
      fb:_L('Close placement minimizes trace inductance and keeps the supply stable.','La colocaci\u00f3n cercana minimiza la inductancia de pista y mantiene estable la alimentaci\u00f3n.')},
     {tag:'recall',stem:_L('For decoupling, you want ESR and ESL to be:','Para desacople, quieres que ESR y ESL sean:'),
      opts:[_L('As high as possible','Lo m\u00e1s altos posible'),_L('As low as possible','Lo m\u00e1s bajos posible'),_L('Exactly equal','Exactamente iguales')],a:1,
      fb:_L('Low ESR/ESL lets the cap respond quickly to current demand.','ESR/ESL bajos permiten que el capacitor responda r\u00e1pido a la demanda de corriente.')}]},
  {id:'p1l6',
   title:_L('Discrete Components','Componentes Discretos'),
   obj:_L('Match common discrete components to their primary job on a board.','Asociar componentes discretos comunes con su funci\u00f3n principal en una placa.'),
   body:[
     {ul:[_L('Resistors \u2014 limit current and set voltage levels (including pull-ups/downs).','Resistencias \u2014 limitan corriente y fijan niveles de voltaje (incluidos pull-up/down).'),
          _L('Inductors & ferrite beads \u2014 oppose fast current change; ferrite beads suppress high-frequency noise.','Inductores y perlas de ferrita \u2014 se oponen al cambio r\u00e1pido de corriente; las perlas suprimen ruido de alta frecuencia.'),
          _L('Diodes \u2014 let current flow one way; used for protection and rectification.','Diodos \u2014 dejan pasar corriente en un sentido; usados para protecci\u00f3n y rectificaci\u00f3n.'),
          _L('MOSFETs & BJTs \u2014 transistors used as switches and amplifiers; gate drive controls a MOSFET.','MOSFET y BJT \u2014 transistores usados como interruptores y amplificadores; el gate drive controla un MOSFET.')]}],
   quiz:[
     {tag:'check',stem:_L('Which component is commonly used to suppress high-frequency noise on a power line?','\u00bfQu\u00e9 componente se usa com\u00fanmente para suprimir ruido de alta frecuencia en una l\u00ednea de alimentaci\u00f3n?'),
      opts:[_L('Ferrite bead','Perla de ferrita'),_L('Pull-up resistor','Resistencia pull-up'),_L('Crystal','Cristal'),_L('LED','LED')],a:0,
      fb:_L('A ferrite bead presents high impedance to high-frequency noise.','Una perla de ferrita presenta alta impedancia al ruido de alta frecuencia.')},
     {tag:'check',stem:_L('A MOSFET used as a switch is controlled by its:','Un MOSFET usado como interruptor se controla por su:'),
      opts:[_L('Gate drive','Gate drive'),_L('Anode','\u00c1nodo'),_L('Winding','Bobinado'),_L('Land pattern','Huella')],a:0,
      fb:_L('Gate drive sets the MOSFET on or off.','El gate drive pone el MOSFET en on u off.')}]},
  {id:'p1l7',
   title:_L('Vias, Planes & Routing','V\u00edas, Planos y Enrutamiento'),
   obj:_L('Explain the role of ground/power planes and why return paths matter.','Explicar el rol de los planos de tierra/potencia y por qu\u00e9 importan los caminos de retorno.'),
   body:[
     {p:_L('A via is a plated hole connecting layers. Copper pours and planes provide low-impedance power and ground across the board.','Una v\u00eda es un agujero metalizado que conecta capas. Los vertidos de cobre y planos proveen potencia y tierra de baja impedancia por toda la placa.')},
     {ul:[_L('Ground and power planes give every signal a nearby, low-impedance return path.','Los planos de tierra y potencia dan a cada se\u00f1al un camino de retorno cercano y de baja impedancia.'),
          _L('Stitching vias tie planes together and control return current.','Las v\u00edas de cosido unen planos y controlan la corriente de retorno.'),
          _L('A split in a plane can force a signal return to detour \u2014 a common source of noise.','Una divisi\u00f3n en un plano puede obligar al retorno de una se\u00f1al a desviarse \u2014 una fuente com\u00fan de ruido.')]}],
   tip:_L('A signal always returns through the path of least impedance \u2014 usually the plane directly beneath the trace. Keep that path intact.','Una se\u00f1al siempre retorna por el camino de menor impedancia \u2014 usualmente el plano justo debajo de la pista. Mant\u00e9n ese camino intacto.'),
   quiz:[
     {tag:'check',stem:_L('What primarily provides a signal its low-impedance return path?','\u00bfQu\u00e9 provee principalmente a una se\u00f1al su camino de retorno de baja impedancia?'),
      opts:[_L('The silkscreen','La serigraf\u00eda'),_L('A nearby ground plane','Un plano de tierra cercano'),_L('The solder mask','La m\u00e1scara de soldadura'),_L('A reference designator','Un designador')],a:1,
      fb:_L('The adjacent ground plane carries the return current.','El plano de tierra adyacente lleva la corriente de retorno.')},
     {tag:'recall',stem:_L('A plated hole connecting two copper layers is a:','Un agujero metalizado que conecta dos capas de cobre es una:'),
      opts:[_L('Pad','Pad'),_L('Via','V\u00eda'),_L('Fillet','Filete')],a:1,
      fb:_L('A via connects layers vertically.','Una v\u00eda conecta capas verticalmente.')}]},
  {id:'p1l8',
   title:_L('Programming & Debug Interfaces','Interfaces de Programaci\u00f3n y Depuraci\u00f3n'),
   obj:_L('Recognize JTAG and SWD and their role in programming and debugging a processor.','Reconocer JTAG y SWD y su rol en programar y depurar un procesador.'),
   body:[
     {p:_L('Before a board does anything useful, you must load firmware and be able to debug it. Two standard interfaces do this.','Antes de que una placa haga algo \u00fatil, debes cargar firmware y poder depurarlo. Dos interfaces est\u00e1ndar hacen esto.')},
     {ul:[_L('JTAG \u2014 a long-standing multi-pin standard for programming and boundary-scan testing.','JTAG \u2014 un est\u00e1ndar de varios pines de larga data para programaci\u00f3n y prueba boundary-scan.'),
          _L('SWD (Serial Wire Debug) \u2014 a 2-pin interface common on ARM Cortex parts; saves pins versus JTAG.','SWD (Serial Wire Debug) \u2014 una interfaz de 2 pines com\u00fan en ARM Cortex; ahorra pines frente a JTAG.')]}],
   quiz:[
     {tag:'check',stem:_L('Which debug interface uses just two pins and is common on ARM Cortex microcontrollers?','\u00bfQu\u00e9 interfaz de depuraci\u00f3n usa solo dos pines y es com\u00fan en microcontroladores ARM Cortex?'),
      opts:[_L('JTAG','JTAG'),_L('SWD','SWD'),_L('SPI','SPI'),_L('UART','UART')],a:1,
      fb:_L('SWD is the 2-pin debug interface widely used on ARM Cortex.','SWD es la interfaz de depuraci\u00f3n de 2 pines muy usada en ARM Cortex.')},
     {tag:'recall',stem:_L('Which interface also supports boundary-scan testing?','\u00bfQu\u00e9 interfaz tambi\u00e9n soporta prueba boundary-scan?'),
      opts:[_L('JTAG','JTAG'),_L('I2C','I2C'),_L('CAN','CAN')],a:0,
      fb:_L('JTAG supports boundary-scan in addition to programming.','JTAG soporta boundary-scan adem\u00e1s de programaci\u00f3n.')}]},
  {id:'p1l9',
   title:_L('Design Verification','Verificaci\u00f3n del Dise\u00f1o'),
